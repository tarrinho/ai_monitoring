<!DOCTYPE html>

<script>function cssv(n){return getComputedStyle(document.documentElement).getPropertyValue(n).trim()||n;}</script>
<style>
  :root{
    --bg:#0d1117; --panel:#161b22; --panel2:#1c2230; --line:#30363d;
    --fg:#e6edf3; --muted:#8b949e; --accent:#58a6ff; --ok:#3fb950;
    --warn:#d29922; --bad:#f85149;
  }
  html[data-theme="light"]{
    --bg:#f6f8fa; --panel:#ffffff; --panel2:#eaeef2; --line:#d0d7de;
    --fg:#1f2328; --muted:#59636e; --accent:#0969da; --ok:#1a7f37;
    --warn:#9a6700; --bad:#cf222e;
  }
  *{box-sizing:border-box}
  body,.card,#sidebar,header{transition:background-color .2s ease,border-color .2s ease,color .2s ease}
  .card:hover{border-color:var(--muted)}
  body{margin:0;background:var(--bg);color:var(--fg);display:flex;min-height:100vh;
    font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
  header{display:flex;align-items:center;gap:12px;padding:14px 20px;flex-wrap:wrap;
    background:var(--panel);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:50}
  header h1{font-size:16px;margin:0;font-weight:600}
  #updated{margin-left:auto;color:var(--muted);font-size:12px}
  main{padding:18px;display:grid;gap:16px;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr))}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:10px;
    padding:14px 16px}
  .card h2{margin:0 0 10px;font-size:13px;text-transform:uppercase;
    letter-spacing:.05em;color:var(--muted);display:flex;align-items:center;
    justify-content:space-between}
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(115px,1fr));gap:10px}
  .kpi{background:var(--panel2);border-radius:8px;padding:10px 12px}
  .kpi .v{font-size:22px;font-weight:600}
  .kpi .v .sub{font-size:11px;font-weight:400;color:var(--muted)}
  .kpi .l{font-size:11px;color:var(--muted);text-transform:uppercase}
  table{width:100%;border-collapse:collapse;margin-top:8px;font-size:12px}
  th,td{text-align:left;padding:5px 6px;border-bottom:1px solid var(--line)}
  th{color:var(--muted);font-weight:500}
  td.num{text-align:right;font-variant-numeric:tabular-nums}
  .badge{font-size:11px;padding:2px 7px;border-radius:20px;background:var(--panel2)}
  .badge.ok{color:var(--ok)} .badge.bad{color:var(--bad)}
  .span-2{grid-column:span 2}
  @media(max-width:720px){.span-2{grid-column:span 1}}
  .chart-grid{display:grid;gap:16px;grid-template-columns:1fr}
  .mini{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:10px}
  .mini h3{margin:0 0 4px;font-size:12px;color:var(--muted);font-weight:500;
    display:flex;justify-content:space-between}
  .mini h3 .cur{color:var(--fg);font-variant-numeric:tabular-nums}
  .mini .chart-wrap{height:320px;margin:0}
  .unavail{color:var(--muted);font-style:italic;padding:6px 0}
  a{color:var(--accent)}
  .pill{font-size:10px;padding:1px 6px;border-radius:10px;background:var(--panel);color:var(--muted)}
  .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;word-break:break-all}

  /* ── lateral collapsible sidebar (AntiBot GW pattern) ── */
  #sidebar{width:164px;flex-shrink:0;background:var(--panel);border-right:1px solid var(--line);
    display:flex;flex-direction:column;padding:14px 0;position:sticky;top:0;height:100vh;overflow-y:auto}
  #sidebar-brand{padding:0 14px 12px;border-bottom:1px solid var(--line);margin-bottom:10px;
    display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
  #sidebar-brand-name{font-size:13px;font-weight:700;color:var(--fg);letter-spacing:.2px}
  #sidebar-brand-ver{font-size:10px;color:var(--muted);margin-top:2px}
  #sidebar-toggle{background:none;border:1px solid var(--line);color:var(--muted);cursor:pointer;
    font-size:13px;line-height:1;border-radius:5px;padding:1px 7px;flex-shrink:0}
  #sidebar-toggle:hover{color:var(--fg);background:var(--panel2)}
  #sidebar-nav{display:flex;flex-direction:column;gap:2px;padding:0 8px;flex:1}
  #sidebar-nav a{color:var(--muted);text-decoration:none;padding:7px 10px;border-radius:6px;
    font-size:13px;border-left:2px solid transparent}
  #sidebar-nav a:hover{color:var(--fg);background:var(--panel2)}
  #sidebar-nav a.active{color:var(--fg);background:var(--panel2);font-weight:600;border-left-color:var(--accent)}
  #sidebar-nav a.has-alert::after{content:"";display:inline-block;width:7px;height:7px;
    border-radius:50%;background:var(--bad);margin-left:7px;vertical-align:middle;
    box-shadow:0 0 0 2px var(--panel);animation:aimonpulse 1.6s ease-in-out infinite}
  @keyframes aimonpulse{0%,100%{opacity:1}50%{opacity:.4}}
  #main-area{flex:1;min-width:0;display:flex;flex-direction:column}
  #sidebar-reopen{display:none;position:fixed;top:10px;left:10px;z-index:300;background:var(--panel);
    border:1px solid var(--line);color:var(--fg);cursor:pointer;font-size:16px;line-height:1;
    border-radius:6px;padding:8px 11px}
  body.sb-collapsed #sidebar{display:none}
  body.sb-collapsed #sidebar-reopen{display:flex;align-items:center;justify-content:center}
  @media(max-width:600px){
    #sidebar{position:fixed;top:0;left:0;height:100%;z-index:200;transform:translateX(-100%);transition:transform .2s}
    body:not(.sb-collapsed) #sidebar{transform:none}
    #sidebar-reopen{display:flex!important;align-items:center;justify-content:center}
  }
  .chart-wrap{position:relative}
  .drag-sel{position:absolute;background:rgba(88,166,255,.18);border:1px solid var(--accent);
    pointer-events:none;z-index:6;border-radius:2px}
</style>
<script>
/* day/night — applied on every page; choice shared via localStorage */
(function(){var KEY="aimon-theme";
  var t=localStorage.getItem(KEY)||"dark";
  document.documentElement.setAttribute("data-theme",t);
  function icon(){var b=document.getElementById("theme-btn");
    if(b)b.textContent=document.documentElement.getAttribute("data-theme")==="light"?"☀️":"🌙";}
  document.addEventListener("DOMContentLoaded",function(){
    var b=document.getElementById("theme-btn"); if(!b)return; icon();
    b.addEventListener("click",function(){
      var cur=document.documentElement.getAttribute("data-theme")==="light"?"dark":"light";
      document.documentElement.setAttribute("data-theme",cur);
      localStorage.setItem(KEY,cur); icon();});
    /* hide dashboard links for unconfigured backends */
    try{
      var tok=new URLSearchParams(location.search).get("token");
      fetch("/api/nav"+(tok?("?token="+encodeURIComponent(tok)):""),
        {headers:tok?{Authorization:"Bearer "+tok}:{}})
        .then(function(r){return r.ok?r.json():null;})
        .then(function(n){ if(!n)return;if(n.admin){var _se=document.getElementById("nav-settings");if(_se)_se.style.display="";}
          [["spend",n.spend],["litellm",n.litellm],["gpu",n.gpu],["ollama",n.ollama],["llamacpp",n.llamacpp],["vllm",n.vllm]].forEach(function(x){
            if(!x[1]) document.querySelectorAll('a[href="/'+x[0]+'"]')
              .forEach(function(a){a.style.display="none";});
          });
        }).catch(function(){});
      // live alert indicator on the sidebar "Alerts" item (from any page)
      function _alertDot(){
        var tk=new URLSearchParams(location.search).get("token");
        fetch("/api/alerts"+(tk?("?token="+encodeURIComponent(tk)):""),
          {headers:tk?{Authorization:"Bearer "+tk}:{}})
          .then(function(r){return r.ok?r.json():null;})
          .then(function(d){ if(!d)return;
            var a=document.querySelector('#sidebar-nav a[href="/alerts"]');
            if(a) a.classList.toggle("has-alert",(d.active||[]).length>0);
          }).catch(function(){});
      }
      _alertDot(); setInterval(_alertDot, 10000);
    }catch(e){}
  });
})();
</script>

<style>
/* backend nav logos (Ollama / llama.cpp / vLLM): an equal-height icon before the label.
   The two mono llama marks tint to the link colour (theme- + hover-aware) via CSS mask;
   vLLM keeps its 2-colour brand mark. Same 15px box → equal visual height in the menu. */

#sidebar-nav a.nl-ollama::before,#sidebar-nav a.nl-llamacpp::before{

#sidebar-nav a.nl-ollama::before{-webkit-mask-image:url("/assets/logos/ollama.svg");mask-image:url("/assets/logos/ollama.svg")}
#sidebar-nav a.nl-llamacpp::before{-webkit-mask-image:url("/assets/logos/llamacpp.svg");mask-image:url("/assets/logos/llamacpp.svg")}

<script>
"use strict";
function escapeHtml(s){
  if(s===null||s===undefined) return "";
  return String(s).replace(/[&<>"']/g,c=>(
    {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}
function setHtml(el, html){ el.innerHTML = DOMPurify.sanitize(html); }
const _timers = [];
window.addEventListener("beforeunload", ()=>{ _timers.forEach(clearInterval); });

function kpi(label,val,sub){
  return `<div class="kpi"><div class="v">${escapeHtml(val)}`
       + (sub?` <span class="sub">${escapeHtml(sub)}</span>`:"")
       + `</div><div class="l">${escapeHtml(label)}</div></div>`;
}
function badge(el, up, txt){ el.className="badge "+(up?"ok":"bad"); el.textContent=up?(txt||"live"):"down"; }

const CHARTS = [
  {id:"c-down", key:"net_down", label:"Download", color:"#7ee787", rate:true},
  {id:"c-up",   key:"net_up",   label:"Upload",   color:"#58a6ff", rate:true},
];
// bytes → human size; rate=true appends "/s". Binary (1024) units, like every
// other size on the dashboard.
function humanBytes(b, rate){
  if(b==null) return "—";
  let n=Number(b); if(!isFinite(n)) return "—";
  const u=["B","KB","MB","GB","TB","PB"]; let i=0;
  while(n>=1024 && i<u.length-1){ n/=1024; i++; }
  return (n<10?n.toFixed(2):n<100?n.toFixed(1):Math.round(n))+" "+u[i]+(rate?"/s":"");
}
const _charts = {};
function mkChart(canvas, cfg){
  return new Chart(canvas, {
    type:"line",
    data:{labels:[],datasets:[{label:cfg.label,data:[],borderColor:cfg.color,
      backgroundColor:cfg.color+"22",borderWidth:1.5,pointRadius:0,tension:.25,fill:true,spanGaps:true}]},
    options:{responsive:true,maintainAspectRatio:false,animation:false,
      interaction:{intersect:false,mode:"index"},
      plugins:{legend:{display:false},tooltip:{callbacks:{label:function(ctx){
        const v=ctx.parsed.y; return cfg.rate?humanBytes(v,true):v;}}}},
      scales:{x:{ticks:{color:cssv("--muted"),maxTicksLimit:6,font:{size:9}},grid:{color:"#30363d33"}},
              y:{ticks:{color:cssv("--muted"),font:{size:9},
                   callback:function(v){return cfg.rate?humanBytes(v,true):v;}},
                 grid:{color:"#30363d33"},beginAtZero:true,max:cfg.max}}}
  });
}
(function build(){
  const grid=document.getElementById("chart-grid");
  for(const cfg of CHARTS){
    const card=document.createElement("div");card.className="mini";card.id=cfg.id+"-card";
    const h=document.createElement("h3");
    const nm=document.createElement("span");nm.textContent=cfg.label;
    const cur=document.createElement("span");cur.className="cur";cur.id=cfg.id+"-cur";cur.textContent="—";
    h.append(nm,cur);
    const wrap=document.createElement("div");wrap.className="chart-wrap";
    const cv=document.createElement("canvas");cv.id=cfg.id;cv.setAttribute("role","img");cv.setAttribute("aria-label",cfg.label||cfg.id);wrap.appendChild(cv);
    card.append(h,wrap);grid.appendChild(card);
    _charts[cfg.id]=mkChart(cv,cfg);
  }
})();
function fmtT(t){ if(!t) return ""; return new Date(t*1000).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}); }
// axisT(pts): label granularity from the ACTUAL data span, not the window name.
function axisT(pts){ const ts=(pts||[]).map(p=>p&&p.t).filter(Boolean); const span=ts.length>1?Math.max(...ts)-Math.min(...ts):0; return function(p){ const t=(p&&typeof p==="object")?p.t:p; if(!t) return ""; const d=new Date(t*1000); return span>180*86400?(d.toLocaleDateString([],{month:"short"})+" '"+String(d.getFullYear()).slice(-2)):span>2*86400?d.toLocaleDateString([],{month:"short",day:"numeric"}):d.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}); }; }
function fmtCur(v){ return v==null?"—":(Math.round(v*100)/100); }
function lastNonNull(pts,key){ for(let i=pts.length-1;i>=0;i--){ if(pts[i][key]!=null) return pts[i][key]; } return null; }

const AUTH = new URLSearchParams(location.search).get("token");
let TIMEEND=null;
const WSECS={"15m":900,"1h":3600,"24h":86400,"30d":2592000,"12mo":31536000};
function wsecs(w){ if(typeof w==="string"&&w.indexOf("custom:")===0){var cs=parseInt(w.slice(7),10); if(cs>0) return cs;} return w==="month"?(Date.now()-Date.UTC(new Date().getUTCFullYear(),new Date().getUTCMonth(),1))/1000:(WSECS[w]||3600);}
// Per-page time window: remember the user's choice for THIS page (path-keyed) so a
// refresh keeps it, and each page keeps its OWN window (not shared site-wide). Falls
// back to the page default when nothing is saved or the saved value isn't a valid button.
function _winKey(){ return "aimon-win:"+location.pathname; }
function _winCustom(w){ return typeof w==="string" && w.indexOf("custom:")===0 && parseInt(w.slice(7),10)>0; }
// Persist {w,end}: a named window (end=null -> live) OR a drag-selected custom range
// ("custom:<secs>" + absolute end t2). Restored on refresh so each page keeps its OWN
// window/zoom until a NEW one is chosen (window button, Live, or a fresh drag).
function _winSave(w, end){ try{ localStorage.setItem(_winKey(), JSON.stringify({w:w, end:(end||null)})); }catch(e){} }
function _winRestore(sel, def, labelId){
  var s=null; try{ s=JSON.parse(localStorage.getItem(_winKey())||"null"); }catch(e){}
  var w=s&&s.w;
  if(_winCustom(w)){
    TIMEEND=(s&&s.end)||null;                 // absolute custom range persists across refresh
    document.querySelectorAll(sel+' button[data-w]').forEach(function(x){
      x.classList.remove("active"); x.setAttribute("aria-pressed","false"); });
    if(labelId){ var lc=document.getElementById(labelId); if(lc) lc.textContent="custom"; }
    return w;
  }
  if(!(w && document.querySelector(sel+' button[data-w="'+w+'"]'))) w=def;
  document.querySelectorAll(sel+' button[data-w]').forEach(function(x){
    var on=x.dataset.w===w; x.classList.toggle("active",on); x.setAttribute("aria-pressed", on?"true":"false"); });
  if(labelId){ var l=document.getElementById(labelId); if(l) l.textContent=w; }
  return w;
}
let WIN = _winRestore("#windows", "24h", "win-label");
async function api(path){
  if(TIMEEND && path.indexOf("window=")>=0)
    path += (path.includes("?")?"&":"?")+"end="+TIMEEND.toFixed(0);
  try{
    const sep=path.includes("?")?"&":"?";
    const url=path+(AUTH?(sep+"token="+encodeURIComponent(AUTH)):"");
    const r=await fetch(url,{headers:AUTH?{Authorization:"Bearer "+AUTH}:{}});
    if(!r.ok){ document.getElementById("updated").textContent="auth/error "+r.status; return null; }
    return await r.json();
  }catch(e){ document.getElementById("updated").textContent="disconnected"; return null; }
}

function renderNet(net){
  const b=document.getElementById("l-badge");
  const st=document.getElementById("l-status");
  if(!net || net.available===false){
    badge(b,false);
    st.textContent="";
    setHtml(document.getElementById("l-kpis"),
      `<div class="unavail">${escapeHtml((net&&net.error)||"no network data")}</div>`);
    setHtml(document.getElementById("l-ifaces"),
      `<div class="unavail">Host network counters unavailable (/proc/net/dev not readable).</div>`);
    return;
  }
  badge(b,true,"live");
  _lastNet=net;
  const ifs=net.interfaces||[];
  st.className="badge ok"; st.textContent=(net.primary||(ifs.length+" iface"))+"";
  // Scope: are these the HOST's NICs or only this container's netns? When the monitor
  // runs in a container without `pid: host`, /proc/net/dev shows just its own eth0
  // (Docker bridge) — warn so the figures aren't mistaken for the host's.
  const scEl=document.getElementById("l-scope");
  if(scEl){
    if(net.scope==="container"){
      scEl.className="badge bad";
      scEl.textContent="container netns — set pid: host to monitor the host";
      scEl.title="/proc/net/dev is per-namespace; only this container's interfaces are visible. Run the monitor with `pid: host` (or on bare metal) to read the host's NICs.";
    } else if(net.scope==="host"){
      scEl.className="badge ok"; scEl.textContent="host"; scEl.title="Reading the host network namespace (PID 1 / bare metal).";
    } else { scEl.textContent=""; scEl.title=""; }
  }
  // Download/Upload are the current live RATES (null on the first tick / after a counter
  // reset). Total down/up are the bytes moved DURING the selected window — integrated from
  // the rate series (loadSeries), so they follow 15m/1h/24h/… rather than the boot counter.
  // (The per-interface table below still shows each iface's cumulative-since-boot bytes.)
  setHtml(document.getElementById("l-kpis"),
    kpi("Download", humanBytes(net.rx_rate_total, true))
    +kpi("Upload", humanBytes(net.tx_rate_total, true))
    +kpi("Total down", _winDown!=null?humanBytes(_winDown):"—", "in "+WIN)
    +kpi("Total up", _winUp!=null?humanBytes(_winUp):"—", "in "+WIN)
    +kpi("Primary", net.primary||"—", ifs.length?`${ifs.length} iface`+(ifs.length>1?"s":""):"")
    +kpi("Interfaces", ifs.length));
  if(!ifs.length){
    setHtml(document.getElementById("l-ifaces"),
      `<div class="unavail">no physical interfaces selected (set NETWORK_IFACES to pin one).</div>`);
    return;
  }
  setHtml(document.getElementById("l-ifaces"),
    `<table><tr><th>Interface</th><th class="num">↓ speed</th><th class="num">↑ speed</th>`
    +`<th class="num">total ↓</th><th class="num">total ↑</th>`
    +`<th class="num">errs</th><th class="num">drops</th></tr>`
    +ifs.map(i=>`<tr><td class="mono">${escapeHtml(i.name)}`
      +(i.name===net.primary?` <span class="pill">primary</span>`:``)+`</td>`
      +`<td class="num">${humanBytes(i.rx_rate, true)}</td>`
      +`<td class="num">${humanBytes(i.tx_rate, true)}</td>`
      +`<td class="num">${humanBytes(i.rx_bytes)}</td>`
      +`<td class="num">${humanBytes(i.tx_bytes)}</td>`
      +`<td class="num">${(i.rx_errs||0)+(i.tx_errs||0)}</td>`
      +`<td class="num">${(i.rx_drop||0)+(i.tx_drop||0)}</td></tr>`).join("")
    +`</table>`);
}

// Bytes transferred DURING the window = area under the rate curve: Σ rate·Δt over the
// series points (net_down/net_up are bytes/s). Trapezoidal between consecutive points,
// skipping gaps/nulls. This is what makes "Total down/up" follow the time window instead
// of showing the cumulative-since-boot counter.
let _winDown=null, _winUp=null, _lastNet=null;
function windowBytes(pts,key){
  let tot=0, seen=false;
  for(let i=1;i<pts.length;i++){
    const a=pts[i-1][key], b=pts[i][key], dt=(pts[i].t||0)-(pts[i-1].t||0);
    if(dt<=0) continue;
    const r=(a!=null&&b!=null)?(a+b)/2:(a!=null?a:(b!=null?b:null));
    if(r!=null){ tot+=r*dt; seen=true; }
  }
  return seen?tot:null;
}
async function loadSeries(){
  const d=await api("/api/series?window="+WIN);
  if(!d) return;
  const pts=d.points||[]; const labels=pts.map(axisT(pts));
  // windowed totals feed the "Total down/up" KPIs — re-render them once computed
  _winDown=windowBytes(pts,"net_down"); _winUp=windowBytes(pts,"net_up");
  if(_lastNet) renderNet(_lastNet);
  for(const cfg of CHARTS){
    const ch=_charts[cfg.id];
    ch.data.labels=labels;
    ch.data.datasets[0].data=pts.map(p=>(p[cfg.key]==null?null:p[cfg.key]));
    ch.update("none");
    const cur=document.getElementById(cfg.id+"-cur");
    if(cur){ const lv=lastNonNull(pts,cfg.key);
      cur.textContent=cfg.rate?humanBytes(lv,true):fmtCur(lv); }
    const card=document.getElementById(cfg.id+"-card");
    if(card) card.style.display=pts.some(p=>p[cfg.key]!=null)?"":"none";
  }
}
function rangedReload(){ loadSeries(); }
function fmtRange(ts){
  const d=new Date(ts*1000), p=n=>String(n).padStart(2,"0");
  return p(d.getDate())+"/"+p(d.getMonth()+1)+" "+p(d.getHours())+":"+p(d.getMinutes());
}
function updateRangeUI(){
  const now=Date.now()/1000;
  document.getElementById("nav-right").disabled = !TIMEEND;
  const _liveBtn=document.getElementById("nav-live");
  if(_liveBtn){ _liveBtn.disabled=!TIMEEND;
    _liveBtn.style.color=TIMEEND?"var(--accent)":"";
    _liveBtn.style.borderColor=TIMEEND?"var(--accent)":""; }
  const lbl=document.getElementById("range-lbl");
  // absolute window bounds shown at the top — start → end, refreshed on every
  // pan (◀ ▶) and window change.
  const _end=TIMEEND||now, _start=_end-wsecs(WIN);
  const _dt=document.getElementById("range-dates");
  if(_dt) _dt.textContent = fmtRange(_start)+"  →  "+fmtRange(_end);
  if(!TIMEEND){ lbl.textContent="live"; return; }
  const m=Math.round((now-TIMEEND)/60);
  lbl.textContent = m>=1440?("-"+Math.round(m/1440)+"d"):m>=60?("-"+Math.round(m/60)+"h"):("-"+m+"m");
}
// ---- drag-to-zoom: drag across ANY chart to set a custom time window (Kibana-style) ----
(function(){
  var dg=null;
  function chartOf(cv){ return (window.Chart && Chart.getChart) ? Chart.getChart(cv) : null; }
  function place(x){
    if(!dg) return; var a=dg.ch.chartArea, r=dg.cv.getBoundingClientRect();
    var lo=Math.max(a.left, Math.min(dg.x0,x)-r.left), hi=Math.min(a.right, Math.max(dg.x0,x)-r.left);
    dg.ov.style.left=lo+"px"; dg.ov.style.width=Math.max(0,hi-lo)+"px";
    dg.ov.style.top=a.top+"px"; dg.ov.style.height=(a.bottom-a.top)+"px";
  }
  document.addEventListener("pointerdown",function(e){
    if(e.button) return;
    var wrap=e.target.closest && e.target.closest(".chart-wrap"); if(!wrap) return;
    var cv=wrap.querySelector("canvas"); if(!cv) return;
    var ch=chartOf(cv); if(!ch||!ch.chartArea) return;
    var ov=document.createElement("div"); ov.className="drag-sel"; wrap.appendChild(ov);
    dg={wrap:wrap,cv:cv,ch:ch,x0:e.clientX,ov:ov}; place(e.clientX); e.preventDefault();
  });
  document.addEventListener("pointermove",function(e){ if(dg) place(e.clientX); });
  document.addEventListener("pointerup",function(e){
    if(!dg) return; var d=dg; dg=null; if(d.ov.parentNode) d.ov.parentNode.removeChild(d.ov);
    if(Math.abs(e.clientX-d.x0)<5) return;                 // a click, not a drag
    var a=d.ch.chartArea, r=d.cv.getBoundingClientRect(), w=a.right-a.left; if(w<=0) return;
    var f1=(Math.min(d.x0,e.clientX)-r.left-a.left)/w, f2=(Math.max(d.x0,e.clientX)-r.left-a.left)/w;
    f1=Math.max(0,Math.min(1,f1)); f2=Math.max(0,Math.min(1,f2));
    var end=TIMEEND||Date.now()/1000, s=end-wsecs(WIN), span=end-s;
    var t1=s+f1*span, t2=s+f2*span;
    if(t2-t1<30) return;                                   // ignore < 30s selections
    WIN="custom:"+Math.round(t2-t1); TIMEEND=t2; _winSave(WIN, TIMEEND);
    document.querySelectorAll("#windows button[data-w]").forEach(function(x){x.classList.remove("active");x.setAttribute("aria-pressed","false");});
    document.querySelectorAll('#win-label,[id$="-win"]').forEach(function(el){ el.textContent="custom"; });
    if(typeof updateRangeUI==="function") updateRangeUI();
    rangedReload();
  });
})();
document.getElementById("nav-left").addEventListener("click",()=>{
  const now=Date.now()/1000; TIMEEND=(TIMEEND||now)-wsecs(WIN);
  updateRangeUI(); rangedReload();
});
document.getElementById("nav-right").addEventListener("click",()=>{
  if(!TIMEEND) return; TIMEEND+=wsecs(WIN);
  if(TIMEEND>=Date.now()/1000) TIMEEND=null;
  updateRangeUI(); rangedReload();
});
document.getElementById("nav-live").addEventListener("click",()=>{
  if(!TIMEEND) return; TIMEEND=null; _winSave(WIN, null); updateRangeUI(); rangedReload();
});
document.querySelectorAll("#windows button[data-w]").forEach(b=>{
  b.addEventListener("click",()=>{
    document.querySelectorAll("#windows button[data-w]").forEach(x=>{x.classList.remove("active");x.setAttribute("aria-pressed","false");});
    b.classList.add("active"); b.setAttribute("aria-pressed","true"); WIN=b.dataset.w; TIMEEND=null; _winSave(WIN, null); updateRangeUI();
    document.getElementById("win-label").textContent=WIN; loadSeries();
  });
});
document.getElementById("export-btn").addEventListener("click",()=>{
  window.open("/api/export?window="+WIN+"&format=csv"
    +(AUTH?("&token="+encodeURIComponent(AUTH)):""),"_blank");
});

async function tick(){
  const d=await api("/api/data?history=1");
  if(d){
    const c=(d.latest||{}).collectors||{};
    renderNet(c.network);
    const t=(d.latest||{}).ts?new Date(d.latest.ts*1000).toLocaleTimeString():"—";
    document.getElementById("updated").textContent="updated "+t;
  }
  await loadSeries();
}
updateRangeUI();
tick();
_timers.push(setInterval(tick,5000));
</script>
</div>
<script>
/* collapsible lateral sidebar — state persisted, active link by path */
(function(){var KEY="aimon_sb";
  function setC(c){document.body.classList.toggle("sb-collapsed",c);
    try{localStorage.setItem(KEY,c?"1":"0");}catch(e){}}
  try{if(localStorage.getItem(KEY)==="1")document.body.classList.add("sb-collapsed");}catch(e){}
  document.addEventListener("DOMContentLoaded",function(){
    var t=document.getElementById("sidebar-toggle"),r=document.getElementById("sidebar-reopen");
    if(t)t.addEventListener("click",function(){setC(true);});
    if(r)r.addEventListener("click",function(){setC(!document.body.classList.contains("sb-collapsed"));});
    var p=location.pathname;
    document.querySelectorAll("#sidebar-nav a").forEach(function(a){
      if((a.getAttribute("href")||"").split("?")[0]===p)a.classList.add("active");});
    // When the page was opened with ?token=, carry it on every internal link so
    // navigation stays authenticated; with a session cookie (no token) links stay clean.
    var _tk=new URLSearchParams(location.search).get("token");
    if(_tk){document.querySelectorAll('a[href^="/"]').forEach(function(a){
      var h=a.getAttribute("href");
      if(h&&h.indexOf("token=")<0)a.setAttribute("href",h+(h.indexOf("?")<0?"?":"&")+"token="+encodeURIComponent(_tk));
    });}
  });
})();
</script>
