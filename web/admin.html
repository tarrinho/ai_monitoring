<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI-Monitoring · Users</title>
<link rel="icon" href="/assets/favicon.svg">
<style>
  :root{--bg:#0d1117;--panel:#161b22;--panel2:#1c2230;--line:#30363d;
    --fg:#e6edf3;--muted:#8b949e;--accent:#58a6ff;--ok:#3fb950;--warn:#d29922;--bad:#f85149}
  html[data-theme="light"]{--bg:#f6f8fa;--panel:#fff;--panel2:#eaeef2;--line:#d0d7de;
    --fg:#1f2328;--muted:#59636e;--accent:#0969da;--ok:#1a7f37;--warn:#9a6700;--bad:#cf222e}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--fg);display:flex;min-height:100vh;
    font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
  header{display:flex;align-items:center;gap:12px;padding:14px 20px;
    background:var(--panel);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:5}
  header h1{font-size:16px;margin:0}
  header .sp{margin-left:auto;display:flex;gap:12px;align-items:center}
  a{color:var(--accent);text-decoration:none}
  main{padding:20px;max-width:1000px;margin:0 auto;display:grid;gap:18px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:16px 18px}
  .card h2{margin:0 0 12px;font-size:13px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:8px 8px;border-bottom:1px solid var(--line);vertical-align:middle}
  th{color:var(--muted);font-weight:500;font-size:11px;text-transform:uppercase}
  .pill{font-size:11px;padding:2px 8px;border-radius:20px;background:var(--panel2)}
  .pill.admin{color:var(--accent)} .pill.viewer{color:var(--muted)}
  .pill.ok{color:var(--ok)} .pill.off{color:var(--bad)}
  .row-form{display:grid;grid-template-columns:1fr 1.4fr 1fr auto auto;gap:10px;align-items:end}
  @media(max-width:720px){.row-form{grid-template-columns:1fr 1fr}}
  label{display:block;font-size:11px;color:var(--muted);margin-bottom:3px}
  input,select{width:100%;padding:8px 10px;border-radius:6px;border:1px solid var(--line);
    background:var(--panel2);color:var(--fg);font-size:13px}
  input:focus,select:focus{outline:none;border-color:var(--accent)}
  button{padding:8px 12px;border:0;border-radius:6px;background:var(--accent);color:#fff;
    font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
  button:hover{filter:brightness(1.08)}
  button.ghost{background:var(--panel2);color:var(--fg);border:1px solid var(--line)}
  button.danger{background:transparent;color:var(--bad);border:1px solid var(--bad)}
  .actions{display:flex;gap:6px;flex-wrap:wrap}
  .msg{margin-top:10px;font-size:13px;min-height:18px}
  .msg.bad{color:var(--bad)} .msg.ok{color:var(--ok)}
  .muted{color:var(--muted)}
  /* ── lateral collapsible sidebar (AntiBot GW pattern) ── */
  #sidebar{width:164px;flex-shrink:0;background:var(--panel);border-right:1px solid var(--line);
    display:flex;flex-direction:column;padding:14px 0;position:sticky;top:0;height:100vh;overflow-y:auto}
  #sidebar-brand{padding:0 14px 12px;border-bottom:1px solid var(--line);margin-bottom:10px;
    display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
  #sidebar-brand-name{font-size:13px;font-weight:700;color:var(--fg);letter-spacing:.2px}
  #sidebar-brand-ver{font-size:10px;color:var(--muted);margin-top:2px}
  #sidebar-toggle{background:none;border:1px solid var(--line);color:var(--muted);cursor:pointer;
    font-size:13px;line-height:1;border-radius:5px;padding:1px 7px;flex-shrink:0}
  #sidebar-toggle:hover{color:var(--fg);background:var(--panel2)}
  #sidebar-nav{display:flex;flex-direction:column;gap:2px;padding:0 8px;flex:1}
  #sidebar-nav a{color:var(--muted);text-decoration:none;padding:7px 10px;border-radius:6px;
    font-size:13px;border-left:2px solid transparent}
  #sidebar-nav a:hover{color:var(--fg);background:var(--panel2)}
  #sidebar-nav a.active{color:var(--fg);background:var(--panel2);font-weight:600;border-left-color:var(--accent)}
  #sidebar-nav a.has-alert::after{content:"";display:inline-block;width:7px;height:7px;
    border-radius:50%;background:var(--bad);margin-left:7px;vertical-align:middle;
    box-shadow:0 0 0 2px var(--panel);animation:aimonpulse 1.6s ease-in-out infinite}
  @keyframes aimonpulse{0%,100%{opacity:1}50%{opacity:.4}}
  #main-area{flex:1;min-width:0;display:flex;flex-direction:column}
  #sidebar-reopen{display:none;position:fixed;top:10px;left:10px;z-index:300;background:var(--panel);
    border:1px solid var(--line);color:var(--fg);cursor:pointer;font-size:16px;line-height:1;
    border-radius:6px;padding:8px 11px}
  body.sb-collapsed #sidebar{display:none}
  body.sb-collapsed #sidebar-reopen{display:flex;align-items:center;justify-content:center}
  @media(max-width:600px){
    #sidebar{position:fixed;top:0;left:0;height:100%;z-index:200;transform:translateX(-100%);transition:transform .2s}
    body:not(.sb-collapsed) #sidebar{transform:none}
    #sidebar-reopen{display:flex!important;align-items:center;justify-content:center}
  }
</style>
<style>
/* backend nav logos (Ollama / llama.cpp / vLLM): an equal-height icon before the label.
   The two mono llama marks tint to the link colour (theme- + hover-aware) via CSS mask;
   vLLM keeps its 2-colour brand mark. Same 15px box → equal visual height in the menu. */
#sidebar-nav a.navlogo::before{content:"";display:inline-block;width:15px;height:15px;
  vertical-align:-3px;margin-right:6px}
#sidebar-nav a.nl-ollama::before,#sidebar-nav a.nl-llamacpp::before{
  background-color:currentColor;-webkit-mask:center/contain no-repeat;mask:center/contain no-repeat}
#sidebar-nav a.nl-ollama::before{-webkit-mask-image:url("/assets/logos/ollama.svg");mask-image:url("/assets/logos/ollama.svg")}
#sidebar-nav a.nl-llamacpp::before{-webkit-mask-image:url("/assets/logos/llamacpp.svg");mask-image:url("/assets/logos/llamacpp.svg")}
#sidebar-nav a.nl-vllm::before{background:url("/assets/logos/vllm.svg") center/contain no-repeat}
</style>
</head>
<body>
<div id="sidebar">
  <div id="sidebar-brand">
    <div>
      <div id="sidebar-brand-name">AI-Monitoring</div>
      <div id="sidebar-brand-ver">v1.8.1</div>
    </div>
    <button id="sidebar-toggle" title="Hide menu" aria-label="Hide menu">‹</button>
  </div>
  <nav id="sidebar-nav" aria-label="Main navigation">
    <a href="/">🏠 Overview</a>
    <a href="/gpu">🖥️ GPU/CPU</a>
    <a href="/network">🌐 Network</a>
    <a href="/litellm">🔀 LiteLLM</a>
    <a href="/spend" style="padding-left:26px">💰 Spend &amp; Quota</a>
    <a href="/ollama" class="navlogo nl-ollama" style="padding-left:26px">Ollama</a>
    <a href="/llamacpp" class="navlogo nl-llamacpp" style="padding-left:26px">llama.cpp</a>
    <a href="/vllm" class="navlogo nl-vllm" style="padding-left:26px">vLLM</a>
    <a href="/settings" id="nav-settings" style="display:none">⚙️ Settings</a>
    <a href="/alerts" style="padding-left:26px">🔔 Alerts</a>
  </nav>
</div>
<button id="sidebar-reopen" title="Show menu" aria-label="Show menu">☰</button>
<div id="main-area">
  <header>
    <h1>User management</h1>
    <div class="sp">
      <span class="muted" id="whoami"></span>
      <button class="ghost" id="theme-btn" type="button" title="Toggle theme">🌙</button>
    </div>
  </header>
  <main>
    <section class="card">
      <h2>Add user</h2>
      <form id="create-form" autocomplete="off">
        <div class="row-form">
          <div><label for="cu">Username</label><input id="cu" name="username" required></div>
          <div><label for="ce">Email</label><input id="ce" name="email" type="email" required></div>
          <div><label for="cp">Password</label><input id="cp" name="password" type="password" required></div>
          <div><label for="cr">Role</label>
            <select id="cr" name="role"><option value="viewer">viewer</option><option value="admin">admin</option></select></div>
          <div><button type="submit">Create</button></div>
        </div>
        <div class="msg" id="create-msg"></div>
      </form>
    </section>
    <section class="card">
      <h2>Users</h2>
      <table>
        <thead><tr><th>User</th><th>Email</th><th>Role</th><th>Status</th><th>Last login</th><th>Actions</th></tr></thead>
        <tbody id="rows"></tbody>
      </table>
      <div class="msg" id="list-msg"></div>
    </section>
    <section class="card">
      <h2>Activity log
        <select id="audit-filter" style="width:auto;margin-left:10px;display:inline-block">
          <option value="">all events</option>
          <option value="login">logins</option>
          <option value="user">user changes</option>
        </select>
      </h2>
      <table>
        <thead><tr><th>When</th><th>Actor</th><th>Action</th><th>Target</th><th>IP</th></tr></thead>
        <tbody id="audit-rows"></tbody>
      </table>
      <div class="msg" id="audit-msg"></div>
    </section>
  </main>
</div>
<script>
(function(){
  var t=localStorage.getItem("aimon-theme")||"dark";
  document.documentElement.setAttribute("data-theme",t);
  function icon(){document.getElementById("theme-btn").textContent=
    document.documentElement.getAttribute("data-theme")==="light"?"☀️":"🌙";}
  icon();
  document.getElementById("theme-btn").addEventListener("click",function(){
    var c=document.documentElement.getAttribute("data-theme")==="light"?"dark":"light";
    document.documentElement.setAttribute("data-theme",c);localStorage.setItem("aimon-theme",c);icon();});

  var CSRF="", ME=null;
  function fmtTime(s){ if(!s) return "—"; try{return new Date(s*1000).toLocaleString();}catch(e){return "—";} }
  function post(url,obj){
    var body=new URLSearchParams(obj).toString();
    return fetch(url,{method:"POST",headers:{"Content-Type":"application/x-www-form-urlencoded","X-CSRF-Token":CSRF},body:body})
      .then(function(r){return r.json().then(function(j){return {ok:r.ok,j:j};});});
  }
  function setMsg(el,text,good){el.textContent=text||"";el.className="msg"+(text?(good?" ok":" bad"):"");}

  function actionBtn(label,cls,fn){var b=document.createElement("button");b.type="button";
    b.className=cls;b.textContent=label;b.addEventListener("click",fn);return b;}

  /* inline profile editor: turn a user row's email + role cells into inputs */
  function beginEdit(tr,u){
    var emailTd=tr.children[1], roleTd=tr.children[2], actTd=tr.children[5];
    emailTd.textContent=""; var ein=document.createElement("input"); ein.type="email";
    ein.value=u.email||""; ein.style.maxWidth="220px"; emailTd.appendChild(ein);
    roleTd.textContent=""; var rsel=document.createElement("select"); rsel.style.width="auto";
    ["viewer","admin"].forEach(function(rv){var o=document.createElement("option");
      o.value=rv;o.textContent=rv;if(rv===u.role)o.selected=true;rsel.appendChild(o);});
    roleTd.appendChild(rsel);
    var wrap=actTd.firstChild; wrap.textContent="";
    wrap.appendChild(actionBtn("Save","",function(){
      act({username:u.name,action:"update",email:ein.value.trim(),role:rsel.value});}));
    wrap.appendChild(actionBtn("Cancel","ghost",function(){ load(); }));
    ein.focus();
  }

  function render(users){
    var tb=document.getElementById("rows"); tb.textContent="";
    users.forEach(function(u){
      var tr=document.createElement("tr");
      function cell(txt,cls){var td=document.createElement("td");if(cls){var s=document.createElement("span");
        s.className=cls;s.textContent=txt;td.appendChild(s);}else{td.textContent=txt;}return td;}
      tr.appendChild(cell(u.name + (u.name===ME?" (you)":"")));
      tr.appendChild(cell(u.email||"—"));
      tr.appendChild(cell(u.role,"pill "+(u.role==="admin"?"admin":"viewer")));
      var statusTd=cell(u.disabled?"disabled":"active","pill "+(u.disabled?"off":"ok"));
      if(u.must_change_pw&&!u.disabled){var pend=document.createElement("span");
        pend.className="pill off";pend.style.marginLeft="6px";pend.textContent="reset pending";
        pend.title="Must set a new password on next login";statusTd.appendChild(pend);
        // cancel the forced-reset requirement right where the message is
        var cancel=document.createElement("button");cancel.type="button";
        cancel.style.cssText="margin-left:6px;padding:1px 7px;font-size:11px;cursor:pointer;"
          +"background:var(--panel2);color:var(--fg);border:1px solid var(--line);border-radius:5px";
        cancel.textContent="Cancel";
        cancel.title="Cancel the forced password reset — the user keeps their current password";
        cancel.addEventListener("click",function(){
          if(confirm("Cancel the password-reset requirement for "+u.name+"? They keep their current "
            +"password and will not be forced to change it on next login."))
            act({username:u.name,action:"clear_reset"});});
        statusTd.appendChild(cancel);}
      tr.appendChild(statusTd);
      tr.appendChild(cell(fmtTime(u.last_login)));
      var td=document.createElement("td"); var wrap=document.createElement("div"); wrap.className="actions";
      wrap.appendChild(actionBtn("Edit","ghost",function(){ beginEdit(tr,u); }));
      wrap.appendChild(actionBtn(u.disabled?"Enable":"Disable","ghost",function(){
        act({username:u.name,action:u.disabled?"enable":"disable"});}));
      wrap.appendChild(actionBtn("Reset pw","ghost",function(){
        var np=prompt("New password for "+u.name+" (min 8 chars):"); if(np) act({username:u.name,action:"reset",password:np});}));
      if(!u.must_change_pw){
        wrap.appendChild(actionBtn("Force reset","ghost",function(){
          if(confirm("Force "+u.name+" to set a new password on next login? Their current sessions end immediately; their password is not changed."))
            act({username:u.name,action:"force_reset"});}));
      }
      wrap.appendChild(actionBtn("Delete","danger",function(){
        if(confirm("Delete user "+u.name+"? This cannot be undone.")) act({username:u.name,action:"delete"});}));
      td.appendChild(wrap); tr.appendChild(td); tb.appendChild(tr);
    });
  }
  function load(){
    fetch("/api/admin/users").then(function(r){return r.ok?r.json():null;}).then(function(d){
      if(!d){setMsg(document.getElementById("list-msg"),"Failed to load users.",false);return;}
      CSRF=d.csrf||""; ME=d.me||null;
      document.getElementById("whoami").textContent=ME?("Signed in as "+ME):"";
      render(d.users||[]); setMsg(document.getElementById("list-msg"),"",true);
    }).catch(function(){setMsg(document.getElementById("list-msg"),"Failed to load users.",false);});
  }
  function act(obj){
    post("/api/admin/users/action",obj).then(function(res){
      if(!res.ok){setMsg(document.getElementById("list-msg"),res.j.error||"Action failed.",false);}
      else{ load(); loadAudit(); }
    });
  }
  var ACT_LABEL={ "login.ok":"signed in", "login.fail":"failed login",
    "login.lockout":"locked out", "logout":"signed out",
    "user.create":"created user", "user.disable":"disabled user",
    "user.enable":"enabled user", "user.delete":"deleted user",
    "user.reset":"reset password", "user.update":"updated profile",
    "user.force_reset":"forced password reset",
    "token.create":"created API token", "token.revoke":"revoked API token" };
  function loadAudit(){
    var f=document.getElementById("audit-filter").value;
    fetch("/api/admin/audit?limit=200"+(f?("&action="+encodeURIComponent(f)):""))
      .then(function(r){return r.ok?r.json():null;}).then(function(d){
        var tb=document.getElementById("audit-rows"); tb.textContent="";
        if(!d){setMsg(document.getElementById("audit-msg"),"Failed to load activity.",false);return;}
        setMsg(document.getElementById("audit-msg"),"",true);
        (d.events||[]).forEach(function(e){
          var tr=document.createElement("tr");
          function c(x){var td=document.createElement("td");td.textContent=(x==null||x==="")?"—":x;return td;}
          tr.appendChild(c(fmtTime(e.ts)));
          tr.appendChild(c(e.actor));
          tr.appendChild(c(ACT_LABEL[e.action]||e.action));
          tr.appendChild(c(e.target));
          tr.appendChild(c(e.ip));
          tb.appendChild(tr);
        });
      }).catch(function(){setMsg(document.getElementById("audit-msg"),"Failed to load activity.",false);});
  }
  document.getElementById("audit-filter").addEventListener("change",loadAudit);
  document.getElementById("create-form").addEventListener("submit",function(ev){
    ev.preventDefault();
    var f=ev.target, m=document.getElementById("create-msg");
    post("/api/admin/users",{username:f.username.value.trim(),email:f.email.value.trim(),
      password:f.password.value,role:f.role.value}).then(function(res){
      if(!res.ok){setMsg(m,res.j.error||"Create failed.",false);}
      else{setMsg(m,"User '"+res.j.user+"' created.",true);f.reset();load();loadAudit();}
    });
  });
  load();
  loadAudit();
})();
</script>
<script>
/* collapsible lateral sidebar + nav-filter + alert-dot — parity with dashboards */
(function(){var KEY="aimon_sb";var _timers=[];
  function setC(c){document.body.classList.toggle("sb-collapsed",c);
    try{localStorage.setItem(KEY,c?"1":"0");}catch(e){}}
  try{if(localStorage.getItem(KEY)==="1")document.body.classList.add("sb-collapsed");}catch(e){}
  window.addEventListener("beforeunload",function(){_timers.forEach(clearInterval);});
  document.addEventListener("DOMContentLoaded",function(){
    var t=document.getElementById("sidebar-toggle"),r=document.getElementById("sidebar-reopen");
    if(t)t.addEventListener("click",function(){setC(true);});
    if(r)r.addEventListener("click",function(){setC(!document.body.classList.contains("sb-collapsed"));});
    var p=location.pathname;
    document.querySelectorAll("#sidebar-nav a").forEach(function(a){
      if((a.getAttribute("href")||"").split("?")[0]===p)a.classList.add("active");});
    // When the page was opened with ?token=, carry it on every internal link so
    // navigation stays authenticated; with a session cookie (no token) links stay clean.
    var _tk=new URLSearchParams(location.search).get("token");
    if(_tk){document.querySelectorAll('a[href^="/"]').forEach(function(a){
      var h=a.getAttribute("href");
      if(h&&h.indexOf("token=")<0)a.setAttribute("href",h+(h.indexOf("?")<0?"?":"&")+"token="+encodeURIComponent(_tk));
    });}
    /* hide nav links for unconfigured backends (same as the dashboards) */
    fetch("/api/nav").then(function(r){return r.ok?r.json():null;}).then(function(n){
      if(!n)return;if(n.admin){var _se=document.getElementById("nav-settings");if(_se)_se.style.display="";}
      [["spend",n.spend],["litellm",n.litellm],["gpu",n.gpu],["ollama",n.ollama],["llamacpp",n.llamacpp],["vllm",n.vllm]].forEach(function(x){
        if(!x[1])document.querySelectorAll('#sidebar-nav a[href="/'+x[0]+'"]').forEach(function(a){a.style.display="none";});
      });
    }).catch(function(){});
    /* live alert dot on the Alerts link */
    function _alertDot(){fetch("/api/alerts").then(function(r){return r.ok?r.json():null;}).then(function(d){
      if(!d)return;var a=document.querySelector('#sidebar-nav a[href="/alerts"]');
      if(a)a.classList.toggle("has-alert",(d.active||[]).length>0);
    }).catch(function(){});}
    _alertDot();_timers.push(setInterval(_alertDot,10000));
  });
})();
</script>
</body>
</html>
