<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<script>function cssv(n){return getComputedStyle(document.documentElement).getPropertyValue(n).trim()||n;}</script>
<style>
  :root{
    --bg:#0d1117; --panel:#161b22; --panel2:#1c2230; --line:#30363d;
    --fg:#e6edf3; --muted:#8b949e; --accent:#58a6ff; --ok:#3fb950;
    --warn:#d29922; --bad:#f85149;
  }
  html[data-theme="light"]{
    --bg:#f6f8fa; --panel:#ffffff; --panel2:#eaeef2; --line:#d0d7de;
    --fg:#1f2328; --muted:#59636e; --accent:#0969da; --ok:#1a7f37;
    --warn:#9a6700; --bad:#cf222e;
  }
  *{box-sizing:border-box}
  body,.card,#sidebar,header{transition:background-color .2s ease,border-color .2s ease,color .2s ease}
  .card:hover{border-color:var(--muted)}
  body{margin:0;background:var(--bg);color:var(--fg);display:flex;min-height:100vh;
    font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
  header{display:flex;align-items:center;gap:12px;padding:14px 20px;flex-wrap:wrap;
    background:var(--panel);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:50}
  header h1{font-size:16px;margin:0;font-weight:600}
  #updated{margin-left:auto;color:var(--muted);font-size:12px}
  main{padding:18px;display:grid;gap:16px;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr))}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:10px;
    padding:14px 16px}
  .card h2{margin:0 0 10px;font-size:13px;text-transform:uppercase;
    letter-spacing:.05em;color:var(--muted);display:flex;align-items:center;
    justify-content:space-between}
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(115px,1fr));gap:10px}
  .kpi{background:var(--panel2);border-radius:8px;padding:10px 12px}
  .kpi .v{font-size:22px;font-weight:600}
  .kpi .v.warn{color:var(--warn)} .kpi .v.bad{color:var(--bad)}
  .kpi .l{font-size:11px;color:var(--muted);text-transform:uppercase}
  /* click-to-toggle help: a native title= is hover-only and vanishes on touch /
     on the move — the per-graph explanation is worth reading, so it stays open
     until dismissed. */
  .info{color:var(--muted);cursor:pointer;font-size:10px;margin-left:5px;
    border:1px solid var(--line);border-radius:50%;width:15px;height:15px;
    display:inline-flex;align-items:center;justify-content:center;line-height:1;
    user-select:none;flex:0 0 auto;vertical-align:middle}
  .info:hover,.info[aria-expanded="true"]{color:var(--fg);border-color:var(--muted)}
  .mini h3 .nm{position:relative;display:inline-flex;align-items:center;min-width:0}
  .info-pop{position:absolute;top:20px;left:0;z-index:30;display:none;
    width:250px;max-width:72vw;padding:9px 11px;border-radius:8px;
    background:var(--panel);border:1px solid var(--line);
    box-shadow:0 6px 22px rgba(0,0,0,.4);color:var(--fg);font-size:11px;
    font-weight:400;line-height:1.55;white-space:normal;text-transform:none;
    text-align:left;letter-spacing:normal}
  .info-pop.open{display:block}
  table{width:100%;border-collapse:collapse;margin-top:8px;font-size:12px}
  th,td{text-align:left;padding:5px 6px;border-bottom:1px solid var(--line)}
  th{color:var(--muted);font-weight:500}
  td.num{text-align:right;font-variant-numeric:tabular-nums}
  .badge{font-size:11px;padding:2px 7px;border-radius:20px;background:var(--panel2)}
  .badge.ok{color:var(--ok)} .badge.bad{color:var(--bad)}
  .span-2{grid-column:span 2}
  @media(max-width:720px){.span-2{grid-column:span 1}}
  .chart-grid{display:grid;gap:16px;grid-template-columns:1fr}
  .mini{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:10px}
  .mini h3{margin:0 0 4px;font-size:12px;color:var(--muted);font-weight:500;
    display:flex;justify-content:space-between}
  .mini h3 .cur{color:var(--fg);font-variant-numeric:tabular-nums}
  .mini .chart-wrap{height:320px;margin:0}
  .unavail{color:var(--muted);font-style:italic;padding:6px 0}
  a{color:var(--accent)}
  .pill{font-size:10px;padding:1px 6px;border-radius:10px;background:var(--panel);color:var(--muted)}
  .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;word-break:break-all}

  /* ── lateral collapsible sidebar (AntiBot GW pattern) ── */
  #sidebar{width:164px;flex-shrink:0;background:var(--panel);border-right:1px solid var(--line);
    display:flex;flex-direction:column;padding:14px 0;position:sticky;top:0;height:100vh;overflow-y:auto}
  #sidebar-brand{padding:0 14px 12px;border-bottom:1px solid var(--line);margin-bottom:10px;
    display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
  #sidebar-brand-name{font-size:13px;font-weight:700;color:var(--fg);letter-spacing:.2px}
  #sidebar-brand-ver{font-size:10px;color:var(--muted);margin-top:2px}
  #sidebar-toggle{background:none;border:1px solid var(--line);color:var(--muted);cursor:pointer;
    font-size:13px;line-height:1;border-radius:5px;padding:1px 7px;flex-shrink:0}
  #sidebar-toggle:hover{color:var(--fg);background:var(--panel2)}
  #sidebar-nav{display:flex;flex-direction:column;gap:2px;padding:0 8px;flex:1}
  #sidebar-nav a{color:var(--muted);text-decoration:none;padding:7px 10px;border-radius:6px;
    font-size:13px;border-left:2px solid transparent}
  #sidebar-nav a:hover{color:var(--fg);background:var(--panel2)}
  #sidebar-nav a.active{color:var(--fg);background:var(--panel2);font-weight:600;border-left-color:var(--accent)}
  #sidebar-nav a.has-alert::after{content:"";display:inline-block;width:7px;height:7px;
    border-radius:50%;background:var(--bad);margin-left:7px;vertical-align:middle;
    box-shadow:0 0 0 2px var(--panel);animation:aimonpulse 1.6s ease-in-out infinite}
  @keyframes aimonpulse{0%,100%{opacity:1}50%{opacity:.4}}
  #main-area{flex:1;min-width:0;display:flex;flex-direction:column}
  #sidebar-reopen{display:none;position:fixed;top:10px;left:10px;z-index:300;background:var(--panel);
    border:1px solid var(--line);color:var(--fg);cursor:pointer;font-size:16px;line-height:1;
    border-radius:6px;padding:8px 11px}
  body.sb-collapsed #sidebar{display:none}
  body.sb-collapsed #sidebar-reopen{display:flex;align-items:center;justify-content:center}
  @media(max-width:600px){
    #sidebar{position:fixed;top:0;left:0;height:100%;z-index:200;transform:translateX(-100%);transition:transform .2s}
    body:not(.sb-collapsed) #sidebar{transform:none}
    #sidebar-reopen{display:flex!important;align-items:center;justify-content:center}
  }
</style>
<script>
/* day/night — applied on every page; choice shared via localStorage */
(function(){var KEY="aimon-theme";
  var t=localStorage.getItem(KEY)||"dark";
  document.documentElement.setAttribute("data-theme",t);
  function icon(){var b=document.getElementById("theme-btn");
    if(b)b.textContent=document.documentElement.getAttribute("data-theme")==="light"?"☀️":"🌙";}
  document.addEventListener("DOMContentLoaded",function(){
    var b=document.getElementById("theme-btn"); if(!b)return; icon();
    b.addEventListener("click",function(){
      var cur=document.documentElement.getAttribute("data-theme")==="light"?"dark":"light";
      document.documentElement.setAttribute("data-theme",cur);
      localStorage.setItem(KEY,cur); icon();});
    /* hide dashboard links for unconfigured backends */
    try{
      var tok=new URLSearchParams(location.search).get("token");
      fetch("/api/nav"+(tok?("?token="+encodeURIComponent(tok)):""),
        {headers:tok?{Authorization:"Bearer "+tok}:{}})
        .then(function(r){return r.ok?r.json():null;})
        .then(function(n){ if(!n)return;if(n.admin){var _se=document.getElementById("nav-settings");if(_se)_se.style.display="";}
          [["spend",n.spend],["litellm",n.litellm],["gpu",n.gpu],["ollama",n.ollama],["llamacpp",n.llamacpp],["vllm",n.vllm]].forEach(function(x){
            if(!x[1]) document.querySelectorAll('a[href="/'+x[0]+'"]')
              .forEach(function(a){a.style.display="none";});
          });
        }).catch(function(){});
      // live alert indicator on the sidebar "Alerts" item (from any page)
      function _alertDot(){
        var tk=new URLSearchParams(location.search).get("token");
        fetch("/api/alerts"+(tk?("?token="+encodeURIComponent(tk)):""),
          {headers:tk?{Authorization:"Bearer "+tk}:{}})
          .then(function(r){return r.ok?r.json():null;})
          .then(function(d){ if(!d)return;
            var a=document.querySelector('#sidebar-nav a[href="/alerts"]');
            if(a) a.classList.toggle("has-alert",(d.active||[]).length>0);
          }).catch(function(){});
      }
      _alertDot(); setInterval(_alertDot, 10000);
    }catch(e){}
  });
})();
</script>
<style>
/* unified time-window control — prettier pills (consistent across pages) */
.windows{display:flex;align-items:center;gap:3px;flex-wrap:wrap}
.windows button{background:var(--panel2);color:var(--muted);border:1px solid var(--line);
  border-radius:7px;padding:4px 11px;font-size:12px;font-weight:500;line-height:1.5;cursor:pointer;
  transition:background .14s ease,color .14s ease,border-color .14s ease}

<style>
/* backend nav logos (Ollama / llama.cpp / vLLM): an equal-height icon before the label.
   The two mono llama marks tint to the link colour (theme- + hover-aware) via CSS mask;
   vLLM keeps its 2-colour brand mark. Same 15px box → equal visual height in the menu. */
#sidebar-nav a.navlogo::before{content:"";display:inline-block;width:15px;height:15px;
  vertical-align:-3px;margin-right:6px}
#sidebar-nav a.nl-ollama::before,#sidebar-nav a.nl-llamacpp::before{
  background-color:currentColor;-webkit-mask:center/contain no-repeat;mask:center/contain no-repeat}
#sidebar-nav a.nl-ollama::before{-webkit-mask-image:url("/assets/logos/ollama.svg");mask-image:url("/assets/logos/ollama.svg")}
#sidebar-nav a.nl-llamacpp::before{-webkit-mask-image:url("/assets/logos/llamacpp.svg");mask-image:url("/assets/logos/llamacpp.svg")}
#sidebar-nav a.nl-vllm::before{background:url("/assets/logos/vllm.svg") center/contain no-repeat}
</style>

<script>
"use strict";
function escapeHtml(s){
  if(s===null||s===undefined) return "";
  return String(s).replace(/[&<>"']/g,c=>(
    {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}
function setHtml(el, html){ el.innerHTML = DOMPurify.sanitize(html); }
const _timers = [];
window.addEventListener("beforeunload", ()=>{ _timers.forEach(clearInterval); });

let HOST_NCPU=0;
function kpi(label,val,cls){
  return `<div class="kpi"><div class="v ${cls||""}">${escapeHtml(val)}</div>`
       + `<div class="l">${escapeHtml(label)}</div></div>`;
}
function badge(el, up, txt){ el.className="badge "+(up?"ok":"bad"); el.textContent=up?(txt||"live"):"down"; }
function baseName(p){ if(!p) return "—"; const s=String(p); const i=s.lastIndexOf("/"); return i>=0?s.slice(i+1):s; }

// vLLM's OWN series. These were llama.cpp's (tok/slots/kvcache) when this page was
// seeded from that template — which plotted llama.cpp's numbers under a vLLM label
// whenever both engines ran side by side.
const CHARTS = [
  {id:"c-run",   key:"vrun",   label:"Running requests",      color:"#7ee787",
   desc:"Requests actively being decoded right now. Sustained level shows how busy the "
       +"engine is — compare against Waiting to see whether it is keeping up with demand."},
  {id:"c-wait",  key:"vwait",  label:"Waiting (queue depth)", color:"#f0883e",
   desc:"Requests queued waiting for a decode slot. Rising here while Running stays flat "
       +"means the server is over capacity (saturation), not just slow."},
  {id:"c-kv",    key:"vkv",    label:"KV cache %",            color:"#f778ba", max:100,
   desc:"Fraction of the KV cache (GPU memory holding attention state) in use. As it "
       +"approaches 100% vLLM must preempt or swap sequences to free room."},
  // latency trio: TTFT is what a user feels first, per-token drives the stream speed,
  // e2e is the whole request. Charting all three separates "slow to start" from
  // "slow to stream".
  {id:"c-ttft",  key:"vttft",  label:"TTFT (s)",              color:"#58a6ff", unit:"s",
   desc:"Time To First Token — how long until the user sees the first token. The latency "
       +"felt first; spikes point to slow prompt prefill or queueing."},
  {id:"c-tpot",  key:"vtpot",  label:"Per-token (s)",         color:"#bc8cff", unit:"s",
   desc:"Average time between generated tokens (TPOT) — it sets the streaming speed once "
       +"generation has started."},
  {id:"c-e2e",   key:"ve2e",   label:"End-to-end (s)",        color:"#39c5cf", unit:"s",
   desc:"Full request latency from prompt to last token (TTFT plus all generation) — the "
       +"total wait a caller experiences."},
  // queue wait rising while running is flat = saturation, not slowness
  {id:"c-queue", key:"vqueue", label:"Queue wait (s)",        color:"#ffa657", unit:"s",
   desc:"Time a request spends queued before decoding begins. Rising queue wait is a "
       +"saturation signal, distinct from slow per-token inference."},
  // prefix-cache hits are why a repeated system prompt gets cheap — higher is better
  {id:"c-hit",   key:"vhit",   label:"Prefix cache hit %",    color:"#e3b341", max:100,
   desc:"Share of prompt tokens served from the prefix cache (reused system prompts). "
       +"Higher is cheaper and faster; a drop means prompts are being recomputed."},
  // Throughput. The raw counters are cumulative since server start and only ever rise,
  // so they are differentiated into tokens/sec — the number an inference server is
  // actually judged on, and the one that was missing entirely.
  {id:"c-ptps",  key:"vptps",  label:"Prompt tokens/s",       color:"#79c0ff",
   desc:"Prompt (input) tokens processed per second — prefill throughput, differentiated "
       +"from vLLM's cumulative-since-start counter."},
  {id:"c-gtps",  key:"vgtps",  label:"Generated tokens/s",    color:"#3fb950",
   desc:"Output tokens produced per second — the headline generation throughput an "
       +"inference server is ultimately judged on."},
];
const _charts = {};
function mkChart(canvas, cfg){
  return new Chart(canvas, {
    type:"line",
    data:{labels:[],datasets:[{label:cfg.label,data:[],borderColor:cfg.color,
      backgroundColor:cfg.color+"22",borderWidth:1.5,pointRadius:0,tension:.25,fill:true,spanGaps:true}]},
    options:{responsive:true,maintainAspectRatio:false,animation:false,
      interaction:{intersect:false,mode:"index"},plugins:{legend:{display:false}},
      scales:{x:{ticks:{color:cssv("--muted"),maxTicksLimit:6,font:{size:9}},grid:{color:"#30363d33"}},
              y:{ticks:{color:cssv("--muted"),font:{size:9}},grid:{color:"#30363d33"},beginAtZero:true,max:cfg.max}}}
  });
}
(function build(){
  const grid=document.getElementById("chart-grid");
  for(const cfg of CHARTS){
    const card=document.createElement("div");card.className="mini";card.id=cfg.id+"-card";
    const h=document.createElement("h3");
    const nm=document.createElement("span");nm.className="nm";
    const lbl=document.createElement("span");lbl.textContent=cfg.label;nm.append(lbl);
    // per-graph explanation: what the graph is for + how to read it. Click to
    // toggle (not hover) so it survives touch and reading, and is dismissed by a
    // second click, an outside click, or Escape (wired once, below).
    if(cfg.desc){
      const info=document.createElement("button");info.type="button";
      info.className="info";info.textContent="ⓘ";
      info.setAttribute("aria-expanded","false");
      info.setAttribute("aria-label","About “"+(cfg.label||cfg.id)+"”: click to toggle");
      const pop=document.createElement("span");pop.className="info-pop";
      pop.setAttribute("role","tooltip");pop.textContent=cfg.desc;
      info.addEventListener("click",function(ev){
        ev.stopPropagation();
        const open=pop.classList.contains("open");
        closeAllInfo();                       // one popover at a time
        if(!open){ pop.classList.add("open"); info.setAttribute("aria-expanded","true"); }
      });
      pop.addEventListener("click",e=>e.stopPropagation());  // clicks inside stay open
      nm.append(" ",info,pop);
    }
    const cur=document.createElement("span");cur.className="cur";cur.id=cfg.id+"-cur";cur.textContent="—";
    h.append(nm,cur);
    const wrap=document.createElement("div");wrap.className="chart-wrap";
    const cv=document.createElement("canvas");cv.id=cfg.id;cv.setAttribute("role","img");cv.setAttribute("aria-label",cfg.label||cfg.id);wrap.appendChild(cv);
    card.append(h,wrap);grid.appendChild(card);
    _charts[cfg.id]=mkChart(cv,cfg);
  }
})();
// Close any open per-graph help popover and reset its trigger's aria state.
function closeAllInfo(){
  document.querySelectorAll(".info-pop.open").forEach(p=>p.classList.remove("open"));
  document.querySelectorAll('.info[aria-expanded="true"]')
    .forEach(b=>b.setAttribute("aria-expanded","false"));
}
// Dismiss on an outside click or Escape — standard popover behaviour. Listeners
// are on document (not per-icon) so they cost nothing per graph.
document.addEventListener("click",closeAllInfo);
document.addEventListener("keydown",e=>{ if(e.key==="Escape") closeAllInfo(); });
function fmtT(t){ if(!t) return ""; return new Date(t*1000).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}); }
// axisT(pts): label granularity from the ACTUAL data span, not the window name.
function axisT(pts){ const ts=(pts||[]).map(p=>p&&p.t).filter(Boolean); const span=ts.length>1?Math.max(...ts)-Math.min(...ts):0; return function(p){ const t=(p&&typeof p==="object")?p.t:p; if(!t) return ""; const d=new Date(t*1000); return span>180*86400?(d.toLocaleDateString([],{month:"short"})+" '"+String(d.getFullYear()).slice(-2)):span>2*86400?d.toLocaleDateString([],{month:"short",day:"numeric"}):d.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}); }; }
function fmtCur(v){ return v==null?"—":(Math.round(v*100)/100); }
function lastNonNull(pts,key){ for(let i=pts.length-1;i>=0;i--){ if(pts[i][key]!=null) return pts[i][key]; } return null; }

const AUTH = new URLSearchParams(location.search).get("token");
let TIMEEND=null;
const WSECS={"15m":900,"1h":3600,"24h":86400,"30d":2592000,"12mo":31536000};
function wsecs(w){return w==="month"?(Date.now()-Date.UTC(new Date().getUTCFullYear(),new Date().getUTCMonth(),1))/1000:(WSECS[w]||3600);}
let WIN = "24h";
async function api(path){
  if(TIMEEND && /\/api\/(series|keyseries|procseries)/.test(path))
    path += (path.includes("?")?"&":"?")+"end="+TIMEEND.toFixed(0);
  try{
    const sep=path.includes("?")?"&":"?";
    const url=path+(AUTH?(sep+"token="+encodeURIComponent(AUTH)):"");
    const r=await fetch(url,{headers:AUTH?{Authorization:"Bearer "+AUTH}:{}});
    if(!r.ok){ document.getElementById("updated").textContent="auth/error "+r.status; return null; }
    return await r.json();
  }catch(e){ document.getElementById("updated").textContent="disconnected"; return null; }
}

// Collector errors are raw Python exception names ("conn: ClientConnectorError",
// "TimeoutError"). Printing those verbatim tells an operator nothing about what to DO,
// and reads as the dashboard itself being broken. Translate the known ones into an
// action; fall back to the raw string so an unknown error is never swallowed.
function friendlyErr(e){
  const raw=String(e||"").trim();
  if(!raw || raw==="unconfigured")
    return "Not configured — set VLLM_BASE_URL (e.g. http://host:8000) to monitor vLLM.";
  if(/ClientConnectorError|ConnectionRefused|ClientOSError|Cannot connect/i.test(raw))
    return "Can't reach the server — check VLLM_BASE_URL and that the container is running "
          +"(use the container name or host IP, not localhost, from inside Docker).";
  if(/Timeout/i.test(raw))
    return "Timed out — the server is slow to respond or unreachable at that address.";
  if(/http 401|http 403/i.test(raw))
    return "Rejected (auth) — set VLLM_API_KEY to match the server's --api-key.";
  if(/http 404/i.test(raw))
    return "Endpoint not found — check the port and that this is a vLLM OpenAI-compatible server.";
  if(/http 5\d\d/i.test(raw))
    return "The server returned an error response — check the vLLM container logs.";
  return raw;   // unknown: show it rather than hide it
}
function renderKpis(v){
  const b=document.getElementById("l-badge");
  const st=document.getElementById("l-status");
  if(!v || v.available===false){
    badge(b,false);
    st.textContent="";
    setHtml(document.getElementById("l-kpis"),
      `<div class="unavail" title="${escapeHtml(String((v&&v.error)||"unconfigured"))}">`
      +`${escapeHtml(friendlyErr(v&&v.error))}</div>`);
    setHtml(document.getElementById("l-model"),
      `<div class="unavail">Set VLLM_BASE_URL (e.g. http://host:8000) to see the loaded model.</div>`);
    return;
  }
  badge(b,true,v.status||"live");
  st.className="badge ok"; st.textContent=v.status||"ok";
  // Waiting is the headline: running tells you it is busy, WAITING tells you it is
  // over capacity. Preemptions >0 means vLLM is evicting sequences under memory
  // pressure — the signal that a context/batch setting needs lowering.
  const wait=v.waiting, warnWait=(wait!=null&&wait>0);
  setHtml(document.getElementById("l-kpis"),
    kpi("Running", v.running!=null?v.running:"—")
    +kpi("Waiting", wait!=null?wait:"—", warnWait?"warn":"")
    +kpi("KV cache", v.kv_cache_pct!=null?v.kv_cache_pct+"%":"—")
    +kpi("TTFT", v.ttft_avg!=null?v.ttft_avg+"s":"—")
    +kpi("Per-token", v.tpot_avg!=null?v.tpot_avg+"s":"—")
    +kpi("End-to-end", v.e2e_avg!=null?v.e2e_avg+"s":"—")
    +kpi("Queue wait", v.queue_avg!=null?v.queue_avg+"s":"—")
    +kpi("Prefix cache", v.prefix_hit_pct!=null?v.prefix_hit_pct+"%":"—")
    +kpi("Tokens/s", v.generation_tps!=null?v.generation_tps:"—")
    +kpi("Swapped", v.swapped!=null?v.swapped:"—", (v.swapped>0)?"warn":"")
    +kpi("Preemptions", v.preemptions!=null?v.preemptions:"—", (v.preemptions>0)?"warn":"")
    +kpi("Status", v.status||"—"));
  // When metrics are off/unreachable the panel must say WHY it is sparse, rather than
  // showing a wall of "—" that reads as a broken backend.
  const multi = v.multi_model
    ? `<div class="unavail">⚠ /metrics reports ${(v.metrics_models||[]).length} models `
      +`(${(v.metrics_models||[]).join(", ")}) — the figures above are SUMMED across them, `
      +`not per-model.</div>`
    : "";
  // vLLM is up and reachable but has served nothing since it restarted: only gauges
  // exist yet. Say that, instead of rendering the same wall of "—" that an unreachable
  // /metrics produces — the two need completely different responses from the operator.
  const idle = v.awaiting_traffic
    ? `<div class="unavail">vLLM is up and /metrics is readable, but it has served `
      +`<b>no requests since it (re)started</b> — token, latency and cache counters are `
      +`only created on the first request, so they read "—" until traffic flows. `
      +`Running/waiting are live.</div>`
    : "";
  const note = v.metrics_available
    ? ""
    : `<div class="unavail">Live counters need vLLM's own /metrics endpoint — `
      +`unreachable or disabled (VLLM_METRICS_ENABLED=0). Showing model + status only.</div>`;
  setHtml(document.getElementById("l-model"),
    idle + multi + note
    +`<table><tr><th>Model</th><th class="num">Running</th><th class="num">Waiting</th>`
    +`<th class="num">KV %</th><th class="num">Prompt tok/s</th><th class="num">Gen tok/s</th>`
    +`<th class="num">Prompt total</th><th class="num">Gen total</th></tr>`
    +`<tr><td class="mono" title="${escapeHtml(v.model||"")}">${escapeHtml(baseName(v.model))}</td>`
    +`<td class="num">${v.running!=null?v.running:"—"}</td>`
    +`<td class="num">${wait!=null?wait:"—"}</td>`
    +`<td class="num">${v.kv_cache_pct!=null?v.kv_cache_pct+"%":"—"}</td>`
    +`<td class="num">${v.prompt_tps!=null?v.prompt_tps:"—"}</td>`
    +`<td class="num">${v.generation_tps!=null?v.generation_tps:"—"}</td>`
    +`<td class="num" title="cumulative since vLLM started">${v.prompt_tokens!=null?Math.round(v.prompt_tokens).toLocaleString():"—"}</td>`
    +`<td class="num" title="cumulative since vLLM started">${v.generation_tokens!=null?Math.round(v.generation_tokens).toLocaleString():"—"}</td>`
    +`</tr></table>`);
}

async function loadSeries(){
  const d=await api("/api/series?window="+WIN);
  if(!d) return;
  const pts=d.points||[]; const labels=pts.map(axisT(pts));
  for(const cfg of CHARTS){
    const ch=_charts[cfg.id];
    ch.data.labels=labels;
    ch.data.datasets[0].data=pts.map(p=>(p[cfg.key]==null?null:p[cfg.key]));
    ch.update("none");
    const cur=document.getElementById(cfg.id+"-cur");
    if(cur) cur.textContent=fmtCur(lastNonNull(pts,cfg.key));
    const card=document.getElementById(cfg.id+"-card");
    if(card) card.style.display=pts.some(p=>p[cfg.key]!=null)?"":"none";
  }
}
function rangedReload(){ loadSeries(); }
function fmtRange(ts){
  const d=new Date(ts*1000), p=n=>String(n).padStart(2,"0");
  return p(d.getDate())+"/"+p(d.getMonth()+1)+" "+p(d.getHours())+":"+p(d.getMinutes());
}
function updateRangeUI(){
  const now=Date.now()/1000;
  document.getElementById("nav-right").disabled = !TIMEEND;
  const _liveBtn=document.getElementById("nav-live");
  if(_liveBtn){ _liveBtn.disabled=!TIMEEND;
    _liveBtn.style.color=TIMEEND?"var(--accent)":"";
    _liveBtn.style.borderColor=TIMEEND?"var(--accent)":""; }
  const lbl=document.getElementById("range-lbl");
  // absolute window bounds shown at the top — start → end, refreshed on every
  // pan (◀ ▶) and window change.
  const _end=TIMEEND||now, _start=_end-wsecs(WIN);
  const _dt=document.getElementById("range-dates");
  if(_dt) _dt.textContent = fmtRange(_start)+"  →  "+fmtRange(_end);
  if(!TIMEEND){ lbl.textContent="live"; return; }
  const m=Math.round((now-TIMEEND)/60);
  lbl.textContent = m>=1440?("-"+Math.round(m/1440)+"d"):m>=60?("-"+Math.round(m/60)+"h"):("-"+m+"m");
}
document.getElementById("nav-left").addEventListener("click",()=>{
  const now=Date.now()/1000; TIMEEND=(TIMEEND||now)-wsecs(WIN);
  updateRangeUI(); rangedReload();
});
document.getElementById("nav-right").addEventListener("click",()=>{
  if(!TIMEEND) return; TIMEEND+=wsecs(WIN);
  if(TIMEEND>=Date.now()/1000) TIMEEND=null;
  updateRangeUI(); rangedReload();
});
document.getElementById("nav-live").addEventListener("click",()=>{
  if(!TIMEEND) return; TIMEEND=null; updateRangeUI(); rangedReload();
});
document.querySelectorAll("#windows button[data-w]").forEach(b=>{
  b.addEventListener("click",()=>{
    document.querySelectorAll("#windows button[data-w]").forEach(x=>{x.classList.remove("active");x.setAttribute("aria-pressed","false");});
    b.classList.add("active"); b.setAttribute("aria-pressed","true"); WIN=b.dataset.w; TIMEEND=null; updateRangeUI();
    document.getElementById("win-label").textContent=WIN; loadSeries();
  });
});
document.getElementById("export-btn").addEventListener("click",()=>{
  window.open("/api/export?window="+WIN+"&format=csv"
    +(AUTH?("&token="+encodeURIComponent(AUTH)):""),"_blank");
});

async function tick(){
  const d=await api("/api/data?history=1");
  if(d){
    const c=(d.latest||{}).collectors||{};
    // host core count, so "CPU threads" can be shown against the cores available
    HOST_NCPU=(c.host&&c.host.ncpu)||0;
    renderKpis(c.vllm);
    const t=(d.latest||{}).ts?new Date(d.latest.ts*1000).toLocaleTimeString():"—";
    document.getElementById("updated").textContent="updated "+t;
  }
  await loadSeries();
}
updateRangeUI();
tick();
_timers.push(setInterval(tick,5000));
</script>
</div>
<script>
/* collapsible lateral sidebar — state persisted, active link by path */
(function(){var KEY="aimon_sb";
  function setC(c){document.body.classList.toggle("sb-collapsed",c);
    try{localStorage.setItem(KEY,c?"1":"0");}catch(e){}}
  try{if(localStorage.getItem(KEY)==="1")document.body.classList.add("sb-collapsed");}catch(e){}
  document.addEventListener("DOMContentLoaded",function(){
    var t=document.getElementById("sidebar-toggle"),r=document.getElementById("sidebar-reopen");
    if(t)t.addEventListener("click",function(){setC(true);});
    if(r)r.addEventListener("click",function(){setC(!document.body.classList.contains("sb-collapsed"));});
    var p=location.pathname;
    document.querySelectorAll("#sidebar-nav a").forEach(function(a){
      if((a.getAttribute("href")||"").split("?")[0]===p)a.classList.add("active");});
    // When the page was opened with ?token=, carry it on every internal link so
    // navigation stays authenticated; with a session cookie (no token) links stay clean.
    var _tk=new URLSearchParams(location.search).get("token");
    if(_tk){document.querySelectorAll('a[href^="/"]').forEach(function(a){
      var h=a.getAttribute("href");
      if(h&&h.indexOf("token=")<0)a.setAttribute("href",h+(h.indexOf("?")<0?"?":"&")+"token="+encodeURIComponent(_tk));
    });}
  });
})();
</script>
