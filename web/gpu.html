<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI-Monitoring · GPU</title>
<link rel="icon" href="/assets/favicon.svg">
<script src="/assets/chart.umd.min.js"></script>
<script src="/assets/purify.min.js"></script>
<style>
  :root{
    --bg:#0d1117; --panel:#161b22; --panel2:#1c2230; --line:#30363d;
    --fg:#e6edf3; --muted:#8b949e; --accent:#58a6ff; --ok:#3fb950;
    --warn:#d29922; --bad:#f85149;
  }
  html[data-theme="light"]{
    --bg:#f6f8fa; --panel:#ffffff; --panel2:#eaeef2; --line:#d0d7de;
    --fg:#1f2328; --muted:#59636e; --accent:#0969da; --ok:#1a7f37;
    --warn:#9a6700; --bad:#cf222e;
  }
  *{box-sizing:border-box}
  body,.card,#sidebar,header{transition:background-color .2s ease,border-color .2s ease,color .2s ease}
  .card:hover{border-color:var(--muted)}
  body{margin:0;background:var(--bg);color:var(--fg);display:flex;min-height:100vh;
    font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
  header{display:flex;align-items:center;gap:12px;padding:14px 20px;flex-wrap:wrap;
    background:var(--panel);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:50}
  header h1{font-size:16px;margin:0;font-weight:600}
  #updated{margin-left:auto;color:var(--muted);font-size:12px}
  main{padding:18px;display:grid;gap:16px;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr))}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:10px;
    padding:14px 16px}
  .card h2{margin:0 0 10px;font-size:13px;text-transform:uppercase;
    letter-spacing:.05em;color:var(--muted);display:flex;align-items:center;
    justify-content:space-between}
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(115px,1fr));gap:10px}
  .kpi{background:var(--panel2);border-radius:8px;padding:10px 12px}
  .kpi .v{font-size:22px;font-weight:600}
  .kpi .l{font-size:11px;color:var(--muted);text-transform:uppercase}
  .kpi .v.warn{color:var(--warn)} .kpi .v.bad{color:var(--bad)}
  table{width:100%;border-collapse:collapse;margin-top:8px;font-size:12px}
  th,td{text-align:left;padding:5px 6px;border-bottom:1px solid var(--line)}
  th{color:var(--muted);font-weight:500}
  td.num{text-align:right;font-variant-numeric:tabular-nums}
  .badge{font-size:11px;padding:2px 7px;border-radius:20px;background:var(--panel2)}
  .badge.ok{color:var(--ok)} .badge.bad{color:var(--bad)}
  .windows{display:flex;gap:4px;margin-left:8px}
  .windows button{background:var(--panel2);color:var(--muted);border:1px solid var(--line);
    border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer}
  .windows button.active{color:var(--fg);border-color:var(--accent);background:#1f6feb22}
  .span-2{grid-column:span 2}
  .span-full{grid-column:1/-1}   /* span every column, whatever the count */
  @media(max-width:720px){.span-2{grid-column:span 1}}
  .chart-grid{display:grid;gap:12px;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr))}
  .mini{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:10px}
  .mini h3{margin:0 0 4px;font-size:12px;color:var(--muted);font-weight:500;
    display:flex;justify-content:space-between}
  .mini h3 .cur{color:var(--fg);font-variant-numeric:tabular-nums}
  .mini .chart-wrap{height:150px;margin:0}
  .unavail{color:var(--muted);font-style:italic;padding:6px 0}
  a{color:var(--accent)}

  /* ── lateral collapsible sidebar (AntiBot GW pattern) ── */
  #sidebar{width:164px;flex-shrink:0;background:var(--panel);border-right:1px solid var(--line);
    display:flex;flex-direction:column;padding:14px 0;position:sticky;top:0;height:100vh;overflow-y:auto}
  #sidebar-brand{padding:0 14px 12px;border-bottom:1px solid var(--line);margin-bottom:10px;
    display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
  #sidebar-brand-name{font-size:13px;font-weight:700;color:var(--fg);letter-spacing:.2px}
  #sidebar-brand-ver{font-size:10px;color:var(--muted);margin-top:2px}
  #sidebar-toggle{background:none;border:1px solid var(--line);color:var(--muted);cursor:pointer;
    font-size:13px;line-height:1;border-radius:5px;padding:1px 7px;flex-shrink:0}
  #sidebar-toggle:hover{color:var(--fg);background:var(--panel2)}
  #sidebar-nav{display:flex;flex-direction:column;gap:2px;padding:0 8px;flex:1}
  #sidebar-nav a{color:var(--muted);text-decoration:none;padding:7px 10px;border-radius:6px;
    font-size:13px;border-left:2px solid transparent}
  #sidebar-nav a:hover{color:var(--fg);background:var(--panel2)}
  #sidebar-nav a.active{color:var(--fg);background:var(--panel2);font-weight:600;border-left-color:var(--accent)}
  #sidebar-nav a.has-alert::after{content:"";display:inline-block;width:7px;height:7px;
    border-radius:50%;background:var(--bad);margin-left:7px;vertical-align:middle;
    box-shadow:0 0 0 2px var(--panel);animation:aimonpulse 1.6s ease-in-out infinite}
  @keyframes aimonpulse{0%,100%{opacity:1}50%{opacity:.4}}
  #main-area{flex:1;min-width:0;display:flex;flex-direction:column}
  #sidebar-reopen{display:none;position:fixed;top:10px;left:10px;z-index:300;background:var(--panel);
    border:1px solid var(--line);color:var(--fg);cursor:pointer;font-size:16px;line-height:1;
    border-radius:6px;padding:8px 11px}
  body.sb-collapsed #sidebar{display:none}
  body.sb-collapsed #sidebar-reopen{display:flex;align-items:center;justify-content:center}
  @media(max-width:600px){
    #sidebar{position:fixed;top:0;left:0;height:100%;z-index:200;transform:translateX(-100%);transition:transform .2s}
    body:not(.sb-collapsed) #sidebar{transform:none}
    #sidebar-reopen{display:flex!important;align-items:center;justify-content:center}
  }
</style>
<script>
/* day/night — applied on every page; choice shared via localStorage */
(function(){var KEY="aimon-theme";
  var t=localStorage.getItem(KEY)||"dark";
  document.documentElement.setAttribute("data-theme",t);
  function icon(){var b=document.getElementById("theme-btn");
    if(b)b.textContent=document.documentElement.getAttribute("data-theme")==="light"?"☀️":"🌙";}
  document.addEventListener("DOMContentLoaded",function(){
    var b=document.getElementById("theme-btn"); if(!b)return; icon();
    b.addEventListener("click",function(){
      var cur=document.documentElement.getAttribute("data-theme")==="light"?"dark":"light";
      document.documentElement.setAttribute("data-theme",cur);
      localStorage.setItem(KEY,cur); icon();});
    /* hide dashboard links for unconfigured backends */
    try{
      var tok=new URLSearchParams(location.search).get("token");
      fetch("/api/nav"+(tok?("?token="+encodeURIComponent(tok)):""),
        {headers:tok?{Authorization:"Bearer "+tok}:{}})
        .then(function(r){return r.ok?r.json():null;})
        .then(function(n){ if(!n)return;
          [["litellm",n.litellm],["gpu",n.gpu],["ollama",n.ollama],["llamacpp",n.llamacpp]].forEach(function(x){
            if(!x[1]) document.querySelectorAll('a[href="/'+x[0]+'"]')
              .forEach(function(a){a.style.display="none";});
          });
        }).catch(function(){});
      // live alert indicator on the sidebar "Alerts" item (from any page)
      function _alertDot(){
        var tk=new URLSearchParams(location.search).get("token");
        fetch("/api/alerts"+(tk?("?token="+encodeURIComponent(tk)):""),
          {headers:tk?{Authorization:"Bearer "+tk}:{}})
          .then(function(r){return r.ok?r.json():null;})
          .then(function(d){ if(!d)return;
            var a=document.querySelector('#sidebar-nav a[href="/alerts"]');
            if(a) a.classList.toggle("has-alert",(d.active||[]).length>0);
          }).catch(function(){});
      }
      _alertDot(); setInterval(_alertDot, 10000);
    }catch(e){}
  });
})();
</script>
</head>
<body>
<div id="sidebar">
  <div id="sidebar-brand">
    <div>
      <div id="sidebar-brand-name">AI-Monitoring</div>
      <div id="sidebar-brand-ver">v1.2.2</div>
    </div>
    <button id="sidebar-toggle" title="Hide menu" aria-label="Hide menu">‹</button>
  </div>
  <nav id="sidebar-nav" aria-label="Main navigation">
    <a href="/">Overview</a>
    <a href="/gpu">GPU</a>
    <a href="/litellm">LiteLLM</a>
    <a href="/ollama">Ollama</a>
    <a href="/llamacpp">llama.cpp</a>
    <a href="/alerts">Alerts</a>
  </nav>
</div>
<button id="sidebar-reopen" title="Show menu" aria-label="Show menu">☰</button>
<div id="main-area">
<header>
  <h1>GPU</h1>
  <div class="windows" id="windows">
    <button id="nav-left" title="shift earlier">◀</button>
    <button data-w="15m">15m</button>
    <button data-w="1h" class="active">1h</button>
    <button data-w="24h">24h</button>
    <button data-w="30d">30d</button>
    <button id="nav-right" title="shift later" disabled>▶</button>
    <span id="range-lbl" style="color:var(--muted);font-size:11px;margin-left:6px">live</span>
    <span id="range-dates" style="color:var(--muted);font-size:11px;margin-left:8px" title="window start → end"></span>
  </div>
  <span id="updated">connecting…</span>
  <button id="theme-btn" class="badge" title="toggle day / night"
    style="cursor:pointer;border:0;background:var(--panel2);color:var(--fg)">🌙</button>
</header>
<main>
  <section class="card span-2" id="card-kpi">
    <h2>Live <span class="badge" id="g-badge"></span></h2>
    <div class="kpis" id="g-kpis"></div>
  </section>

  <section class="card span-2" id="card-list">
    <h2>Per-GPU</h2>
    <div id="g-list"><div class="unavail">no data</div></div>
  </section>

  <section class="card span-full" id="card-appcpu">
    <h2>CPU usage by app (stacked) — <span id="appcpu-win">1h</span>
      <span class="info" title="Per-process CPU % of the top-10 apps over time, stacked. Per-app GPU usage is not exposed by nvidia-smi in this setup — the aggregate GPU util is charted above.">ⓘ</span></h2>
    <div class="chart-wrap" style="height:280px"><canvas id="appcpu-chart"></canvas></div>
  </section>

  <section class="card span-full" id="card-charts">
    <h2>GPU metrics over time — <span id="win-label">1h</span>
      <a id="export-btn" class="badge" style="cursor:pointer" title="download CSV">⬇ CSV</a>
    </h2>
    <div class="chart-grid" id="chart-grid"></div>
  </section>
</main>

<script>
"use strict";
function escapeHtml(s){
  if(s===null||s===undefined) return "";
  return String(s).replace(/[&<>"']/g,c=>(
    {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}
function setHtml(el, html){ el.innerHTML = DOMPurify.sanitize(html); }
const _timers = [];
window.addEventListener("beforeunload", ()=>{ _timers.forEach(clearInterval); });

function bytes(n){
  if(!n) return "0 B";
  const u=["B","KB","MB","GB","TB"]; let i=0; n=Number(n);
  while(n>=1024&&i<u.length-1){n/=1024;i++;}
  return n.toFixed(i?1:0)+" "+u[i];
}
function kpi(label,val,cls){
  return `<div class="kpi"><div class="v ${cls||""}">${escapeHtml(val)}</div>`
       + `<div class="l">${escapeHtml(label)}</div></div>`;
}
function badge(el, up, txt){ el.className="badge "+(up?"ok":"bad"); el.textContent=up?(txt||"live"):"down"; }

// GPU-only time series (keys come straight from /api/series).
const CHARTS = [
  {id:"c-gpu",  key:"gpu",       label:"GPU util %",  color:"#bc8cff", unit:"%", max:100},
  {id:"c-pow",  key:"power",     label:"Power (W)",   color:"#ffa657", unit:" W"},
  {id:"c-temp", key:"gtemp",     label:"Temp (°C)",   color:"#ff7b72", unit:"°"},
  {id:"c-tw",   key:"tokwatt",   label:"Tokens/watt", color:"#7ee787"},
];
const _charts = {};
function mkChart(canvas, cfg){
  const yTick = cfg.bytes
    ? {color:"#8b949e",font:{size:9},callback:v=>bytes(v)}
    : {color:"#8b949e",font:{size:9}};
  return new Chart(canvas, {
    type:"line",
    data:{labels:[],datasets:[{label:cfg.label,data:[],borderColor:cfg.color,
      backgroundColor:cfg.color+"22",borderWidth:1.5,pointRadius:0,tension:.25,fill:true,spanGaps:true}]},
    options:{responsive:true,maintainAspectRatio:false,animation:false,
      interaction:{intersect:false,mode:"index"},plugins:{legend:{display:false}},
      scales:{x:{ticks:{color:"#8b949e",maxTicksLimit:6,font:{size:9}},grid:{color:"#30363d33"}},
              y:{ticks:yTick,grid:{color:"#30363d33"},beginAtZero:true,max:cfg.max}}}
  });
}
(function build(){
  const grid=document.getElementById("chart-grid");
  for(const cfg of CHARTS){
    const card=document.createElement("div");card.className="mini";card.id=cfg.id+"-card";
    const h=document.createElement("h3");
    const nm=document.createElement("span");nm.textContent=cfg.label;
    const cur=document.createElement("span");cur.className="cur";cur.id=cfg.id+"-cur";cur.textContent="—";
    h.append(nm,cur);
    const wrap=document.createElement("div");wrap.className="chart-wrap";
    const cv=document.createElement("canvas");cv.id=cfg.id;wrap.appendChild(cv);
    card.append(h,wrap);grid.appendChild(card);
    _charts[cfg.id]=mkChart(cv,cfg);
  }
})();
function fmtT(t){ return t?new Date(t*1000).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}):""; }

// Stacked per-app CPU% over time (top-10 apps, one colour each).
const PROC_COLORS=["#58a6ff","#3fb950","#f778ba","#e3b341","#bc8cff","#ff7b72",
  "#39c5cf","#ffa657","#7ee787","#d2a8ff"];
const appCpuChart=new Chart(document.getElementById("appcpu-chart"),{
  type:"line", data:{labels:[],datasets:[]},
  options:{responsive:true,maintainAspectRatio:false,animation:false,
    interaction:{intersect:false,mode:"index"},
    plugins:{legend:{labels:{color:"#8b949e",boxWidth:10,font:{size:10}}}},
    scales:{
      x:{ticks:{color:"#8b949e",maxTicksLimit:8,font:{size:9}},grid:{color:"#30363d33"}},
      y:{stacked:true,beginAtZero:true,grid:{color:"#30363d33"},
         ticks:{color:"#8b949e",font:{size:9},callback:v=>v+"%"}}}}
});
async function loadAppCpu(){
  document.getElementById("appcpu-win").textContent=WIN;
  const d=await api("/api/procseries?kind=cpu&window="+WIN);
  if(!d) return;
  const pts=d.points||[], apps=d.apps||[];
  appCpuChart.data.labels=pts.map(p=>fmtT(p.t));
  appCpuChart.data.datasets=apps.map((a,i)=>({label:a,
    data:pts.map(p=>p[a]==null?null:p[a]),
    borderColor:PROC_COLORS[i%PROC_COLORS.length],
    backgroundColor:PROC_COLORS[i%PROC_COLORS.length]+"66",
    // stacked area: fill to the previous dataset (not to zero) so each band shows
    // its own pure colour — fill:true fills to origin, stacking translucent layers
    // and blending every band with the ones below (green→olive, pink→mauve).
    borderWidth:1,pointRadius:0,tension:.25,fill:i?"-1":"origin",spanGaps:true}));
  appCpuChart.update("none");
}
function fmtCur(cfg,v){ return v==null?"—":(cfg.bytes?bytes(v):(Math.round(v*100)/100)+(cfg.unit||"")); }
function lastNonNull(pts,key){ for(let i=pts.length-1;i>=0;i--){ if(pts[i][key]!=null) return pts[i][key]; } return null; }

const AUTH = new URLSearchParams(location.search).get("token");
let TIMEEND=null;
const WSECS={"15m":900,"1h":3600,"24h":86400,"30d":2592000};
let WIN = "1h";
async function api(path){
  if(TIMEEND && /\/api\/(series|keyseries|procseries)/.test(path))
    path += (path.includes("?")?"&":"?")+"end="+TIMEEND.toFixed(0);
  try{
    const sep=path.includes("?")?"&":"?";
    const url=path+(AUTH?(sep+"token="+encodeURIComponent(AUTH)):"");
    const r=await fetch(url,{headers:AUTH?{Authorization:"Bearer "+AUTH}:{}});
    if(!r.ok){ document.getElementById("updated").textContent="auth/error "+r.status; return null; }
    return await r.json();
  }catch(e){ document.getElementById("updated").textContent="disconnected"; return null; }
}

function renderKpis(g){
  const b=document.getElementById("g-badge");
  if(!g || g.available===false){
    badge(b,false);
    const msg = (g&&g.error)||"unconfigured";
    setHtml(document.getElementById("g-kpis"),`<div class="unavail">${escapeHtml(msg)}</div>`);
    setHtml(document.getElementById("g-list"),
      `<div class="unavail">No GPU detected. Runs where nvidia-smi/rocm-smi is, `
      +`or via GPU_SSH / GPU_METRICS_URL for a remote box.</div>`);
    return;
  }
  badge(b,true,(g.mode||"")+" "+(g.vendor||""));
  const thr=g.throttled?"bad":"";
  setHtml(document.getElementById("g-kpis"),
    kpi("GPU util", g.util+"%")
    // VRAM only meaningful on discrete GPUs; unified-memory (e.g. GB10) reports N/A
    +(g.vram_total!=null?kpi("VRAM used", bytes(g.vram_used))
        +kpi("VRAM total", bytes(g.vram_total)):"")
    +kpi("Power", g.power!=null?g.power+" W":"—")
    +kpi("Temp", g.temp_max!=null?g.temp_max+"°":"—")
    +kpi("Throttled", g.throttled?"YES":"no", thr)
    +kpi("GPUs", g.count)
    +kpi("Vendor", g.vendor||"—")
    +kpi("Mode", g.mode||"—"));
  if(g.gpus&&g.gpus.length){
    let rows=g.gpus.map(x=>`<tr><td>${escapeHtml(x.name)}</td>`
      +`<td class="num">${x.util}%</td>`
      +`<td class="num">${bytes(x.vram_used)} / ${bytes(x.vram_total)}</td>`
      +`<td class="num">${x.power!=null?x.power+"W":"—"}</td>`
      +`<td class="num">${x.temp!=null?x.temp+"°":"—"}</td></tr>`).join("");
    setHtml(document.getElementById("g-list"),
      `<table><tr><th>GPU</th><th class="num">util</th><th class="num">VRAM</th>`
      +`<th class="num">power</th><th class="num">temp</th></tr>${rows}</table>`);
  } else setHtml(document.getElementById("g-list"),`<div class="unavail">no per-GPU detail</div>`);
}

async function loadSeries(){
  const d=await api("/api/series?window="+WIN);
  if(!d) return;
  const pts=d.points||[]; const labels=pts.map(p=>fmtT(p.t));
  for(const cfg of CHARTS){
    const ch=_charts[cfg.id];
    ch.data.labels=labels;
    ch.data.datasets[0].data=pts.map(p=>(p[cfg.key]==null?null:p[cfg.key]));
    ch.update("none");
    const cur=document.getElementById(cfg.id+"-cur");
    if(cur) cur.textContent=fmtCur(cfg,lastNonNull(pts,cfg.key));
    const card=document.getElementById(cfg.id+"-card");
    if(card) card.style.display=pts.some(p=>p[cfg.key]!=null)?"":"none";
  }
}
function rangedReload(){ loadSeries(); loadAppCpu(); }
function fmtRange(ts){
  const d=new Date(ts*1000), p=n=>String(n).padStart(2,"0");
  return p(d.getDate())+"/"+p(d.getMonth()+1)+" "+p(d.getHours())+":"+p(d.getMinutes());
}
function updateRangeUI(){
  const now=Date.now()/1000;
  document.getElementById("nav-right").disabled = !TIMEEND;
  const lbl=document.getElementById("range-lbl");
  // absolute window bounds shown at the top — start → end, refreshed on every
  // pan (◀ ▶) and window change.
  const _end=TIMEEND||now, _start=_end-WSECS[WIN];
  const _dt=document.getElementById("range-dates");
  if(_dt) _dt.textContent = fmtRange(_start)+"  →  "+fmtRange(_end);
  if(!TIMEEND){ lbl.textContent="live"; return; }
  const m=Math.round((now-TIMEEND)/60);
  lbl.textContent = m>=1440?("-"+Math.round(m/1440)+"d"):m>=60?("-"+Math.round(m/60)+"h"):("-"+m+"m");
}
document.getElementById("nav-left").addEventListener("click",()=>{
  const now=Date.now()/1000; TIMEEND=(TIMEEND||now)-WSECS[WIN];
  updateRangeUI(); rangedReload();
});
document.getElementById("nav-right").addEventListener("click",()=>{
  if(!TIMEEND) return; TIMEEND+=WSECS[WIN];
  if(TIMEEND>=Date.now()/1000) TIMEEND=null;
  updateRangeUI(); rangedReload();
});
document.querySelectorAll("#windows button[data-w]").forEach(b=>{
  b.addEventListener("click",()=>{
    document.querySelectorAll("#windows button[data-w]").forEach(x=>x.classList.remove("active"));
    b.classList.add("active"); WIN=b.dataset.w; TIMEEND=null; updateRangeUI();
    document.getElementById("win-label").textContent=WIN; loadSeries(); loadAppCpu();
  });
});
document.getElementById("export-btn").addEventListener("click",()=>{
  window.open("/api/export?window="+WIN+"&format=csv"
    +(AUTH?("&token="+encodeURIComponent(AUTH)):""),"_blank");
});

async function tick(){
  const d=await api("/api/data?history=1");
  if(d){
    const c=(d.latest||{}).collectors||{};
    renderKpis(c.gpu);
    const t=(d.latest||{}).ts?new Date(d.latest.ts*1000).toLocaleTimeString():"—";
    document.getElementById("updated").textContent="updated "+t;
  }
  await loadSeries();
  await loadAppCpu();
}
updateRangeUI();
tick();
_timers.push(setInterval(tick,5000));
</script>
</div>
<script>
/* collapsible lateral sidebar — state persisted, active link by path */
(function(){var KEY="aimon_sb";
  function setC(c){document.body.classList.toggle("sb-collapsed",c);
    try{localStorage.setItem(KEY,c?"1":"0");}catch(e){}}
  try{if(localStorage.getItem(KEY)==="1")document.body.classList.add("sb-collapsed");}catch(e){}
  document.addEventListener("DOMContentLoaded",function(){
    var t=document.getElementById("sidebar-toggle"),r=document.getElementById("sidebar-reopen");
    if(t)t.addEventListener("click",function(){setC(true);});
    if(r)r.addEventListener("click",function(){setC(!document.body.classList.contains("sb-collapsed"));});
    var p=location.pathname;
    document.querySelectorAll("#sidebar-nav a").forEach(function(a){
      if(a.getAttribute("href")===p)a.classList.add("active");});
  });
})();
</script>
