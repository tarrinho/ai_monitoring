<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI-Monitoring · Settings</title>
<link rel="icon" href="/assets/favicon.svg">
<style>
  :root{--bg:#0d1117;--panel:#161b22;--panel2:#1c2230;--line:#30363d;
    --fg:#e6edf3;--muted:#8b949e;--accent:#58a6ff;--ok:#3fb950;--warn:#d29922;--bad:#f85149}
  html[data-theme="light"]{--bg:#f6f8fa;--panel:#fff;--panel2:#eaeef2;--line:#d0d7de;
    --fg:#1f2328;--muted:#59636e;--accent:#0969da;--ok:#1a7f37;--warn:#9a6700;--bad:#cf222e}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--fg);display:flex;min-height:100vh;
    font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
  header{display:flex;align-items:center;gap:12px;padding:14px 20px;
    background:var(--panel);border-bottom:1px solid var(--line)}
  header h1{font-size:16px;margin:0}
  header .sp{margin-left:auto;display:flex;gap:12px;align-items:center}
  a{color:var(--accent);text-decoration:none}
  main{padding:18px 22px;width:100%}          /* full page width (was capped at 760px) */
  .intro{color:var(--muted);font-size:12px;margin:0 0 10px;max-width:1000px}
  /* inline help chip — full text in the native title tooltip */
  .ttip{display:inline-block;cursor:help;color:var(--accent);font-size:11px;
    border:1px solid var(--line);border-radius:50%;width:15px;height:15px;line-height:13px;
    text-align:center;margin-left:2px;vertical-align:middle}
  .card .gsub{margin-bottom:8px}
  /* clickable card title → opens an info popup explaining the card */
  .cardinfo{cursor:pointer;display:inline-flex;align-items:center;gap:5px;border-radius:5px;
    padding:1px 4px;margin:-1px -4px}
  .cardinfo:hover{color:var(--fg);background:var(--panel2)}
  .cardinfo .ci-i{font-size:11px;color:var(--accent);font-weight:400}
  /* organized info popup (reuses .modal-ov / .modal) */
  .infobody{font-size:12.5px;line-height:1.55}
  .inforow{display:flex;gap:10px;padding:6px 0;border-top:1px solid var(--line)}
  .inforow:first-child{border-top:0}
  .infok{flex:0 0 96px;color:var(--muted);font-size:10.5px;text-transform:uppercase;
    letter-spacing:.05em;padding-top:2px}
  .infov{flex:1;min-width:0}
  .infov b{color:var(--fg)} .infov code{background:var(--panel2);border:1px solid var(--line);
    border-radius:4px;padding:0 4px;font-size:11.5px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:10px;
    padding:14px 16px;margin-bottom:16px}
  /* ── free-form dashboard board: 12-col grid, fixed row unit → cards placed at explicit
        x/y with real gaps, resizable in width AND height ── */
  #board{display:grid;grid-template-columns:repeat(12,1fr);grid-auto-rows:26px;gap:10px;
    margin-bottom:14px;align-items:stretch}
  #board > .card{margin-bottom:0;padding:12px 14px;position:relative;min-width:0;overflow:auto}
  #board > .card h2{margin-bottom:6px;display:flex;align-items:center;gap:6px}
  @media(max-width:900px){                     /* stack full-width on narrow screens */
    #board{display:block}
    #board > .card{margin-bottom:12px}
  }
  /* grip = move to any cell · edge/corner handles = resize width/height/both */
  .draghandle{cursor:grab;color:var(--muted);font-size:12px;line-height:1;user-select:none;
    flex-shrink:0;letter-spacing:-1px}
  .draghandle:hover{color:var(--fg)} .draghandle:active{cursor:grabbing}
  #board > .card.dragging{opacity:.55;outline:2px dashed var(--accent);outline-offset:-2px;
    box-shadow:0 8px 24px rgba(0,0,0,.4)}
  #board > .card.resizing{outline:2px dashed var(--accent);outline-offset:-2px;user-select:none}
  .rsz{position:absolute;z-index:3;color:transparent}
  .rsz-e{top:0;right:0;width:10px;height:100%;cursor:ew-resize}
  .rsz-s{left:0;bottom:0;height:10px;width:100%;cursor:ns-resize}
  .rsz-se{right:0;bottom:0;width:16px;height:16px;cursor:nwse-resize}
  #board > .card:hover .rsz-se{color:var(--muted)}
  .rsz-se::after{content:"⌟";position:absolute;right:2px;bottom:-1px;font-size:11px}
  .rsz-e:hover,.rsz-s:hover,.rsz-se:hover{color:var(--accent)!important;
    background:linear-gradient(var(--accent),var(--accent));background-size:100% 100%;opacity:.12}
  /* two compact settings per row inside each card (auto-fits to card width) */
  .grid2{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
    gap:2px 14px;margin-top:2px}
  /* one setting on a single tight line: label (help on hover) · small field · ✓ · ↺ */
  .srow{display:flex;align-items:center;gap:5px;padding:3px 0;min-width:0}
  .srow .lbl{flex:1;min-width:0;font-size:12px;white-space:nowrap;overflow:hidden;
    text-overflow:ellipsis;cursor:help;border-bottom:1px dotted var(--line)}
  .srow .lbl.mod{color:var(--warn)}
  .srow .lbl .dot{color:var(--warn);margin-left:3px;border:0}
  .srow input,.srow select{flex:0 0 auto;width:60px;padding:3px 6px;font-size:12px}
  .srow select{width:auto;max-width:96px}
  .srow .ib{flex:0 0 auto;border:1px solid var(--line);background:var(--panel2);
    color:var(--muted);border-radius:5px;padding:2px 6px;font-size:12.5px;line-height:1;
    cursor:pointer;font-weight:700}
  .srow .ib.save:hover{border-color:var(--accent);color:var(--accent)}
  .srow .ib.reset:hover{color:var(--fg)}
  .srow .ib.ok{border-color:var(--ok);color:var(--ok)}
  .srow .ib.bad{border-color:var(--bad);color:var(--bad)}
  /* Teams (wide, per-user rows + key strips) vs Model costs (thin: model · kind · ✓↺) */
  .litellm-grid{display:grid;grid-template-columns:minmax(0,1.9fr) minmax(0,1fr);
    gap:16px;align-items:start}
  @media(max-width:900px){.litellm-grid{grid-template-columns:1fr}}  /* stack on narrow */
  .litellm-grid .card{margin-bottom:0;min-width:0}
  .card h2{margin:0 0 2px;font-size:13px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}
  .card .gsub{color:var(--muted);font-size:12px;margin:0 0 12px}
  .row{display:grid;grid-template-columns:1fr 150px auto auto;gap:10px;align-items:center;
    padding:9px 0;border-top:1px solid var(--line)}
  .row:first-of-type{border-top:0}
  .trow{grid-template-columns:1fr 130px 96px auto auto}   /* key | team | budget | save | reset */
  @media(max-width:560px){.trow{grid-template-columns:1fr 1fr}}
  .lbl{font-size:13px} .lbl .h{display:block;color:var(--muted);font-size:11.5px;font-weight:400}
  .lbl .mod{color:var(--warn);font-size:10px;margin-left:6px;text-transform:uppercase;letter-spacing:.04em}
  input,select{width:100%;padding:7px 9px;border-radius:6px;border:1px solid var(--line);
    background:var(--panel2);color:var(--fg);font-size:13px;font-variant-numeric:tabular-nums}
  input:focus,select:focus{outline:none;border-color:var(--accent)}
  .row button{border:0;border-radius:6px;padding:7px 12px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap}
  .btn-refresh{border:1px solid var(--accent);background:transparent;color:var(--accent);
    border-radius:6px;padding:5px 12px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap}
  .btn-refresh:hover:not(:disabled){background:var(--accent);color:#fff}
  .btn-refresh:disabled{opacity:.6;cursor:default}
  .trow button{padding:4px 9px;font-size:11px}          /* compact Teams/Models buttons */
  .trow input,.trow select{padding:5px 7px;font-size:12px}
  /* per-key team sync icon (inside the label cell) */
  .ksync{border:0;background:none;color:var(--muted);cursor:pointer;font-size:12px;
    padding:0 4px;margin-left:6px;line-height:1;vertical-align:middle}
  .ksync:hover{color:var(--accent)} .ksync:disabled{cursor:default;opacity:.6}
  .ksync.spin{display:inline-block;animation:kspin .7s linear infinite}
  @keyframes kspin{to{transform:rotate(360deg)}}
  /* compact Teams / Model-costs rows — same one-line style as the config .srow cards */
  .srow.tteam,.srow.tmodel{border-top:1px solid var(--line);padding:5px 0;gap:6px}
  .srow.tteam:first-of-type,.srow.tmodel:first-of-type{border-top:0}
  .srow.tteam .lbl,.srow.tmodel .lbl{flex:1 1 90px}
  .srow .tin{width:104px;flex:0 0 auto} .srow .bin{width:56px;flex:0 0 auto}
  .srow .min{width:auto;max-width:130px;flex:0 0 auto}
  .srow .ksync{margin-left:0;font-size:13px}
  /* Teams — ONE line per user: email · team · budget · actions · keys(scroll) */
  .ublock{border-top:1px solid var(--line)} .ublock:first-child{border-top:0}
  .urow{display:grid;grid-template-columns:minmax(140px,1.1fr) 150px 66px auto minmax(0,1.9fr);
    gap:10px;align-items:center;padding:6px 11px}
  .urow .uid{font-weight:600;font-size:12.5px;min-width:0;overflow:hidden;
    text-overflow:ellipsis;white-space:nowrap;cursor:pointer}
  .urow .uid:hover{color:var(--accent);text-decoration:underline}
  /* click-to-open structured details: ID · username · email · team · keys */
  .udetails{padding:8px 12px 12px;background:var(--panel2);font-size:12px}
  .udrow{display:flex;gap:12px;padding:2px 0}
  .udk{flex:0 0 92px;color:var(--muted);font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;padding-top:2px}
  .udv{flex:1;min-width:0;word-break:break-word;font-variant-numeric:tabular-nums}
  .udkeys{display:flex;flex-direction:column;gap:2px;margin-top:2px;padding-left:104px}
  .udkey{font-size:11.5px} .udkey b{font-weight:600} .udkm{color:var(--muted)}
  .teamcell{min-width:0} .teamcell .tsel,.teamcell .newin{width:100%;padding:4px 6px;font-size:12px}
  .urow .bin{width:66px;text-align:right}
  .ubtns{display:flex;gap:3px;align-items:center}
  /* all of a user's keys on the SAME line, horizontally scrolling (chips; details in tooltip) */
  .kstrip{display:flex;gap:6px;min-width:0;overflow-x:auto;white-space:nowrap;
    padding-bottom:1px;overscroll-behavior:contain}
  .kchip{flex-shrink:0;font-size:11px;background:var(--panel);border:1px solid var(--line);
    border-radius:20px;padding:2px 9px;white-space:nowrap;font-variant-numeric:tabular-nums}
  .kchip.ov{border-color:var(--warn);color:var(--warn)}
  .kchip{cursor:pointer} .kchip:hover{border-color:var(--accent);color:var(--accent)}
  /* key → user/email reassignment popup */
  .modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;
    align-items:center;justify-content:center;z-index:200}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:12px;
    padding:18px 20px;width:min(420px,92vw);box-shadow:0 12px 40px rgba(0,0,0,.5)}
  .modal h3{margin:0 0 4px;font-size:14px}
  .modal .msub{color:var(--muted);font-size:11.5px;margin-bottom:12px;word-break:break-all}
  .modal label{display:block;font-size:11px;color:var(--muted);text-transform:uppercase;
    letter-spacing:.05em;margin-bottom:4px}
  .modal input{width:100%;margin-bottom:6px}
  .modal .mmsg{font-size:12px;min-height:16px} .modal .mmsg.bad{color:var(--bad)}
  .modal .mbtns{display:flex;gap:8px;justify-content:flex-end;margin-top:10px}
  .modal .mbtns .spacer{margin-right:auto}
  /* tall enough to show the top ~10 users by usage before scrolling */
  .uscroll{max-height:min(64vh,460px);overflow:auto;overscroll-behavior:contain;
    border:1px solid var(--line);border-radius:9px;margin-top:6px}
  @media(max-width:820px){
    .urow{grid-template-columns:1fr 130px 60px auto;row-gap:6px}
    .urow .kstrip{grid-column:1/-1}
  }
  .save{background:var(--accent);color:#fff} .save:hover{filter:brightness(1.08)}
  .reset{background:transparent;color:var(--muted);border:1px solid var(--line)}
  .reset:hover{color:var(--fg)}
  .dflt{font-size:11px;color:var(--muted);white-space:nowrap}
  .msg{font-size:12px;min-height:16px;margin-top:2px} .msg.ok{color:var(--ok)} .msg.bad{color:var(--bad)}
  @media(max-width:560px){.row{grid-template-columns:1fr 1fr}}
  .card h2{scroll-margin-top:14px}
  /* team summary strip (top of Teams card) */
  .tsumhd{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);
    margin:10px 0 8px;font-weight:600}
  .tsumhd:first-child{margin-top:0}
  .teamsum{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:8px;margin-bottom:6px}
  .tchip{background:var(--panel2);border:1px solid var(--line);border-left:3px solid var(--accent);
    border-radius:8px;padding:9px 11px}
  .tchip b{font-size:13px;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .tchip .tmeta{font-size:11.5px;color:var(--muted);font-variant-numeric:tabular-nums}
  .tbrow{display:flex;gap:5px;align-items:center;margin-top:8px}
  .tbrow input{width:96px;padding:5px 7px;font-size:12px}
  .tbrow button{padding:5px 10px;font-size:11px;margin:0}
  .tbmsg{font-size:12px;color:var(--muted)}
  /* truncate long key names so they don't blow out the row */
  .lbl{min-width:0}
  .kname{display:inline-block;max-width:100%;overflow:hidden;text-overflow:ellipsis;
    white-space:nowrap;vertical-align:bottom;font-variant-numeric:tabular-nums}
  /* ── lateral collapsible sidebar (AntiBot GW pattern) ── */
  #sidebar{width:164px;flex-shrink:0;background:var(--panel);border-right:1px solid var(--line);
    display:flex;flex-direction:column;padding:14px 0;position:sticky;top:0;height:100vh;overflow-y:auto}
  #sidebar-brand{padding:0 14px 12px;border-bottom:1px solid var(--line);margin-bottom:10px;
    display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
  #sidebar-brand-name{font-size:13px;font-weight:700;color:var(--fg);letter-spacing:.2px}
  #sidebar-brand-ver{font-size:10px;color:var(--muted);margin-top:2px}
  #sidebar-toggle{background:none;border:1px solid var(--line);color:var(--muted);cursor:pointer;
    font-size:13px;line-height:1;border-radius:5px;padding:1px 7px;flex-shrink:0}
  #sidebar-toggle:hover{color:var(--fg);background:var(--panel2)}
  #sidebar-nav{display:flex;flex-direction:column;gap:2px;padding:0 8px;flex:1}
  #sidebar-nav a{color:var(--muted);text-decoration:none;padding:7px 10px;border-radius:6px;
    font-size:13px;border-left:2px solid transparent}
  #sidebar-nav a:hover{color:var(--fg);background:var(--panel2)}
  #sidebar-nav a.active{color:var(--fg);background:var(--panel2);font-weight:600;border-left-color:var(--accent)}
  #sidebar-nav a.has-alert::after{content:"";display:inline-block;width:7px;height:7px;
    border-radius:50%;background:var(--bad);margin-left:7px;vertical-align:middle;
    box-shadow:0 0 0 2px var(--panel);animation:aimonpulse 1.6s ease-in-out infinite}
  @keyframes aimonpulse{0%,100%{opacity:1}50%{opacity:.4}}
  #main-area{flex:1;min-width:0;display:flex;flex-direction:column}
  #sidebar-reopen{display:none;position:fixed;top:10px;left:10px;z-index:300;background:var(--panel);
    border:1px solid var(--line);color:var(--fg);cursor:pointer;font-size:16px;line-height:1;
    border-radius:6px;padding:8px 11px}
  body.sb-collapsed #sidebar{display:none}
  body.sb-collapsed #sidebar-reopen{display:flex;align-items:center;justify-content:center}
  @media(max-width:600px){
    #sidebar{position:fixed;top:0;left:0;height:100%;z-index:200;transform:translateX(-100%);transition:transform .2s}
    body:not(.sb-collapsed) #sidebar{transform:none}
    #sidebar-reopen{display:flex!important;align-items:center;justify-content:center}
  }
</style>
</head>
<body>
<div id="sidebar">
  <div id="sidebar-brand">
    <div>
      <div id="sidebar-brand-name">AI-Monitoring</div>
      <div id="sidebar-brand-ver">v1.5.7</div>
    </div>
    <button id="sidebar-toggle" title="Hide menu" aria-label="Hide menu">‹</button>
  </div>
  <nav id="sidebar-nav" aria-label="Main navigation">
    <a href="/">🏠 Overview</a>
    <a href="/gpu">🖥️ GPU</a>
    <a href="/litellm">🔀 LiteLLM</a>
    <a href="/spend" style="padding-left:26px">💰 Spend &amp; Quota</a>
    <a href="/ollama" style="padding-left:26px">🦙 Ollama</a>
    <a href="/llamacpp" style="padding-left:26px">🐫 llama.cpp</a>
    <a href="/settings">⚙️ Settings</a>
    <a href="/alerts" style="padding-left:26px">🔔 Alerts</a>
  </nav>
</div>
<button id="sidebar-reopen" title="Show menu" aria-label="Show menu">☰</button>
<div id="main-area">
  <header>
    <h1 style="display:flex;align-items:center;gap:6px">
      <button id="reset-layout" type="button" class="btn-refresh" style="padding:2px 9px;font-size:11px;margin-right:14px">Reset layout</button>
      <span id="settings-info" class="cardinfo" tabindex="0" role="button"
            title="Click for info about this page">Settings <span class="ci-i">ⓘ</span></span>
    </h1>
    <div class="sp">
      <span style="color:var(--muted);font-size:12px" id="whoami"></span>
      <button id="theme-btn" type="button" style="background:var(--panel2);color:var(--fg);border:1px solid var(--line);border-radius:6px;padding:4px 9px;cursor:pointer" title="Toggle theme">🌙</button>
    </div>
  </header>
  <main>
    <div id="board">
    <section class="card" id="teams-card" data-card="l:teams">
      <h2 id="sec-teams" style="display:flex;align-items:center;justify-content:space-between;gap:10px">
        <span id="teams-info" class="cardinfo" tabindex="0" role="button"
              title="Click for info about this card">Teams <span class="ci-i">ⓘ</span></span>
        <button id="teams-refresh" type="button" class="btn-refresh">Refresh from LiteLLM</button>
      </h2>
      <div id="teams-src" class="gsub" style="display:none"></div>
      <div id="teams"></div>
    </section>
    <section class="card" id="models-card" data-card="l:models">
      <h2 id="sec-models" style="display:flex;align-items:center;gap:6px">
        <span id="models-info" class="cardinfo" tabindex="0" role="button"
              title="Click for info about this card">Model costs <span class="ci-i">ⓘ</span></span>
      </h2>
      <div id="models"></div>
    </section>
    </div>
  </main>
</div>
<script>
(function(){
  var t=localStorage.getItem("aimon-theme")||"dark";
  document.documentElement.setAttribute("data-theme",t);
  function icon(){document.getElementById("theme-btn").textContent=
    document.documentElement.getAttribute("data-theme")==="light"?"☀️":"🌙";}
  icon();
  document.getElementById("theme-btn").addEventListener("click",function(){
    var c=document.documentElement.getAttribute("data-theme")==="light"?"dark":"light";
    document.documentElement.setAttribute("data-theme",c);localStorage.setItem("aimon-theme",c);icon();});

  var CSRF="";
  var _knownEmails=[];   // existing users (emails LiteLLM reported) — the only allowed reassign targets
  function fmt(v){return (typeof v==="number"&&!Number.isInteger(v))?String(v):String(v);}
  function post(params){
    return fetch("/api/admin/settings",{method:"POST",
      headers:{"Content-Type":"application/x-www-form-urlencoded","X-CSRF-Token":CSRF},
      body:new URLSearchParams(params).toString()})
      .then(function(r){return r.json().then(function(j){return {ok:r.ok,j:j};});});
  }
  // Build one editable row per tunable, grouped by section. DOM API only (no innerHTML).
  function slug(s){ return "sec-"+String(s).toLowerCase().replace(/[^a-z0-9]+/g,"-"); }
  // ── free-form dashboard board: each card has an explicit {x,y,w,h} in a 12-col grid
  //    (real gaps allowed), drag to ANY cell + resize in BOTH width and height. Positions
  //    /sizes saved SERVER-SIDE (DB) so the arrangement follows the deployment. ──
  var COLS=12, GAP=10, ROWH=26, _grid={};   // _grid: {card_id:{x,y,w,h}}
  function board(){ return document.getElementById("board"); }
  function isCard(c){ return c.classList&&c.classList.contains("card"); }
  function boardCards(){ return [].slice.call(board().children).filter(isCard); }
  function defWH(card){ var id=card.dataset.card;
    return id==="l:teams"?{w:8,h:14}:(id==="l:models"?{w:4,h:9}:{w:4,h:8}); }
  function loadLayout(cb){
    fetch("/api/admin/ui-layout?name=settings_cards").then(function(r){return r.ok?r.json():null;})
      .then(function(d){ _grid=(d&&d.grid)||{}; if(cb)cb(); }).catch(function(){ if(cb)cb(); });
  }
  function saveLayout(){
    var g={}; boardCards().forEach(function(c){ var id=c.dataset.card; if(id&&_grid[id]) g[id]=_grid[id]; });
    _grid=g;
    fetch("/api/admin/ui-layout",{method:"POST",
      headers:{"Content-Type":"application/x-www-form-urlencoded","X-CSRF-Token":CSRF},
      body:new URLSearchParams({name:"settings_cards",grid:JSON.stringify(g)}).toString()}).catch(function(){});
  }
  function overlap(a,b){ return a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y; }
  function others(exclude){ return boardCards().filter(function(c){
    return c!==exclude && _grid[c.dataset.card]; }).map(function(c){
      var g=_grid[c.dataset.card]; return {x:g.x,y:g.y,w:g.w,h:g.h}; }); }
  function freeAt(x,y,w,h,exclude){          // no overlap with any OTHER card (gaps ok)
    if(x<1||y<1||x+w>COLS+1) return false;
    var box={x:x,y:y,w:w,h:h};
    return !others(exclude).some(function(r){ return overlap(box,r); });
  }
  function firstFree(w,h,exclude){           // top-left-most empty slot for a new/auto card
    for(var y=1;y<300;y++) for(var x=1;x<=COLS-w+1;x++) if(freeAt(x,y,w,h,exclude)) return {x:x,y:y};
    return {x:1,y:1};
  }
  function place(card){ var g=_grid[card.dataset.card]; if(!g) return;
    card.style.gridColumn=g.x+" / span "+g.w; card.style.gridRow=g.y+" / span "+g.h; }
  function applyBoard(){                      // place every card; auto-slot the un-positioned
    boardCards().forEach(function(c){ var id=c.dataset.card; if(!id) return;
      if(!_grid[id]){ var d=defWH(c); var p=firstFree(d.w,d.h,c); _grid[id]={x:p.x,y:p.y,w:d.w,h:d.h}; }
      place(c); });

  function metrics(){ var r=board().getBoundingClientRect();
    return {r:r, colW:(r.width-GAP*(COLS-1))/COLS}; }
  function cellFromXY(cx,cy){ var m=metrics();
    return {x:Math.round((cx-m.r.left)/(m.colW+GAP))+1, y:Math.round((cy-m.r.top)/(ROWH+GAP))+1}; }
  function makeDraggable(card){
    if(card._dragMade) return; card._dragMade=true;
    var h=card.querySelector("h2");
    var grip=document.createElement("span"); grip.className="draghandle"; grip.textContent="⠿";
    grip.title="Drag to move this card to any position (gaps allowed)";
    function mv(e){ var g=_grid[card.dataset.card]; if(!g) return;
      var cell=cellFromXY(e.clientX,e.clientY);
      var x=Math.max(1,Math.min(COLS-g.w+1,cell.x)), y=Math.max(1,cell.y);
      if((x!==g.x||y!==g.y) && freeAt(x,y,g.w,g.h,card)){ g.x=x; g.y=y; place(card); } }
    function up(){ card.classList.remove("dragging"); document.removeEventListener("mousemove",mv);
      document.removeEventListener("mouseup",up); saveLayout(); }
    grip.addEventListener("mousedown",function(e){ e.preventDefault(); card.classList.add("dragging");

  function makeResizable(card){
    if(card._rszMade) return; card._rszMade=true;
    ["e","s","se"].forEach(function(dir){     // right = width, bottom = height, corner = both
      var hd=document.createElement("div"); hd.className="rsz rsz-"+dir;
      hd.title = dir==="e"?"Drag to resize width":(dir==="s"?"Drag to resize height":"Drag to resize");
      card.appendChild(hd);
      hd.addEventListener("mousedown",function(e){ e.preventDefault(); e.stopPropagation();
        var g=_grid[card.dataset.card], m=metrics(), sx=e.clientX, sy=e.clientY, sw=g.w, sh=g.h;
        card.classList.add("resizing");
        function mv(ev){
          if(dir.indexOf("e")>=0){ var nw=Math.max(1,Math.min(COLS-g.x+1,
            sw+Math.round((ev.clientX-sx)/(m.colW+GAP)))); if(freeAt(g.x,g.y,nw,g.h,card)) g.w=nw; }
          if(dir.indexOf("s")>=0){ var nh=Math.max(1,
            sh+Math.round((ev.clientY-sy)/(ROWH+GAP))); if(freeAt(g.x,g.y,g.w,nh,card)) g.h=nh; }
          place(card);
        }
        function up(){ card.classList.remove("resizing"); document.removeEventListener("mousemove",mv);
          document.removeEventListener("mouseup",up); saveLayout(); }
        document.addEventListener("mousemove",mv); document.addEventListener("mouseup",up);

  function render(list){
    var groups={},order=[];
    list.forEach(function(s){ if(!groups[s.group]){groups[s.group]=[];order.push(s.group);} groups[s.group].push(s); });
    var b=board(); initBoard();
    // remove existing config cards (keep the static Teams / Model-costs cards intact)
    [].slice.call(b.querySelectorAll(":scope > .card.gcard")).forEach(function(c){ c.remove(); });
    var firstStatic=b.querySelector(":scope > .card:not(.gcard)");   // teams-card (or null)
    var frag=document.createDocumentFragment();
    order.forEach(function(g){
      var card=document.createElement("section"); card.className="card gcard";
      card.dataset.group=g; card.dataset.card="g:"+g; card.dataset.defspan="4";
      var h=document.createElement("h2"); h.id=slug(g); h.textContent=g; card.appendChild(h);
      var grid=document.createElement("div"); grid.className="grid2";
      groups[g].forEach(function(s){ grid.appendChild(rowFor(s)); });
      card.appendChild(grid);

  // One compact line per setting: label (help + default in a hover tooltip) · small field

  function rowFor(s){
    var row=document.createElement("div"); row.className="srow";
    var lbl=document.createElement("span"); lbl.className="lbl"; lbl.textContent=s.label;
    var tip=s.help||s.label;
    if(s.default!=null) tip+=" · default "+fmt(s.default);
    lbl.title=tip;                                   // help + default → tooltip
    if(s.overridden){ lbl.className="lbl mod";
      var dot=document.createElement("span"); dot.className="dot"; dot.textContent=" •";
      dot.title="modified from default"; lbl.appendChild(dot); }
    row.appendChild(lbl);
    var field;
    if(s.type==="choice"){
      field=document.createElement("select");
      (s.choices||[]).forEach(function(c){var o=document.createElement("option");o.value=c;o.textContent=c;
        if(String(c)===String(s.value))o.selected=true;field.appendChild(o);});
    }else{
      field=document.createElement("input");
      field.type="number"; field.value=fmt(s.value);
      if(s.min!=null)field.min=s.min; if(s.max!=null)field.max=s.max;
      if(s.type==="float")field.step="any"; else field.step="1";
    }
    field.title=tip;
    row.appendChild(field);
    var save=document.createElement("button"); save.className="ib save"; save.type="button";
    save.textContent="✓"; save.title="Save";
    var reset=document.createElement("button"); reset.className="ib reset"; reset.type="button";
    reset.textContent="↺"; reset.title="Reset to default";
    function flash(cls,txt){ save.classList.remove("ok","bad"); if(cls)save.classList.add(cls);
      save.title=txt||"Save"; setTimeout(function(){save.classList.remove("ok","bad");save.title="Save";},1600); }
    save.addEventListener("click",function(){
      post({action:"set",name:s.name,value:field.value}).then(function(res){
        if(!res.ok){flash("bad",res.j.error||"save failed");return;}
        flash("ok","saved"); lbl.className="lbl mod";
      }).catch(function(){flash("bad","save failed");});
    });
    reset.addEventListener("click",function(){
      post({action:"reset",name:s.name}).then(function(res){
        if(!res.ok){flash("bad",res.j.error||"reset failed");return;}
        field.value=fmt(res.j.value); lbl.className="lbl"; flash("ok","reset to default");
      }).catch(function(){flash("bad","reset failed");});
    });
    row.appendChild(save); row.appendChild(reset);
    return row;

      ["Purpose",function(v){ _T(v,"Operator tuning — settings are "); _B(v,"applied live"); _T(v," (no restart), "); _B(v,"persisted"); _T(v," across restarts, "); _B(v,"admin-only"); _T(v," and "); _B(v,"audited"); _T(v,"."); }],
      ["Persistence",function(v){ _T(v,"Changes persist across restarts and "); _B(v,"override the .env defaults"); _T(v,". Reset returns a setting to its environment/default value."); }],
      ["Scope",function(v){ _T(v,"Only "); _B(v,"non-secret operational settings"); _T(v," live here — secrets, ports, backend URLs and security switches stay in "); _C(v,".env"); _T(v,"."); }],
      ["Edit a setting",function(v){ _T(v,"Hover a label for its help + default. "); _B(v,"✓"); _T(v," saves, "); _B(v,"↺"); _T(v," resets to default."); }],
      ["Arrange cards",function(v){ _T(v,"Drag a card's "); _B(v,"⠿"); _T(v," handle to place it at any position (gaps allowed); drag its right/bottom edge or corner "); _B(v,"⌟"); _T(v," to resize width & height. The layout is saved in the DB — "); _B(v,"Reset layout"); _T(v," restores the default."); }]
    ]);
  }
  function openTeamsInfo(){
    cardInfoModal("Teams — what this card does",[
      ["Purpose",function(v){ _T(v,"Group LiteLLM keys by "); _B(v,"user → team"); _T(v,", and set a monthly "); _B(v,"budget ($/mo)"); _T(v," per team. This feeds the by-team rollup on the Spend & Quota page."); }],
      ["Layout",function(v){ _T(v,"One row per "); _B(v,"user"); _T(v," (email/alias). Click a user to expand their "); _B(v,"keys"); _T(v,"; users with no owner fall under "); _B(v,"Unassigned"); _T(v,"."); }],
      ["Set team",function(v){ _T(v,"Type a team name and click "); _B(v,"✓"); _T(v," to save an override for that user's keys. "); _B(v,"↺"); _T(v," clears the team + budget override."); }],
      ["Change user",function(v){ _T(v,"Click a "); _B(v,"key chip"); _T(v," to reassign that key's associated "); _B(v,"user / email"); _T(v," (regroups the key)."); }],
      ["Refresh",function(v){ _B(v,"⟳"); _T(v," re-detects a key's team from LiteLLM and lets LiteLLM "); _B(v,"win"); _T(v," — overwriting any saved override for that key."); }],
      ["Caching",function(v){ _T(v,"Detected teams are "); _B(v,"cached"); _T(v," (LiteLLM's lookup is flaky), so the board doesn't re-fetch on every load. Use "); _B(v,"Refresh from LiteLLM"); _T(v," to re-detect."); var s=(document.getElementById("teams-src")||{}).textContent; if(s){ _T(v," Status: "); _T(v,s); } }],
      ["Budgets",function(v){ _T(v,"Team budgets are a LiteLLM "); _B(v,"Enterprise"); _T(v," feature, so they're managed here — overriding LiteLLM's reported team and "); _C(v,"max_budget"); _T(v,"."); }]
    ]);
  }
  function openModelsInfo(){
    cardInfoModal("Model costs — what this card does",[
      ["Purpose",function(v){ _T(v,"Mark each model "); _B(v,"real"); _T(v," (external paid API) or "); _B(v,"estimated"); _T(v," (self-hosted). This drives the real-vs-estimated split on the "); _B(v,"Spend & Quota"); _T(v," cost charts."); }],
      ["Auto-detect",function(v){ _T(v,"The kind is "); _B(v,"auto-detected"); _T(v," from the model name — open-weight families → estimated, hosted providers → real."); }],
      ["Override",function(v){ _T(v,"Pick "); _B(v,"real"); _T(v," or "); _B(v,"estimated"); _T(v," and click "); _B(v,"✓"); _T(v," when the guess is wrong (e.g. an open-weight model you route through a paid API). "); _B(v,"↺"); _T(v," returns it to auto-detect."); }],
      ["Cost basis",function(v){ _T(v,"Only "); _B(v,"real"); _T(v," (external) models are billed cash; "); _B(v,"estimated"); _T(v," (self-hosted) cost is imputed from tokens × your LiteLLM per-model price."); }]
    ]);
  }
  function loadTeams(force){
    var rb=document.getElementById("teams-refresh");
    if(force&&rb){rb.disabled=true;rb.textContent="Refreshing…";}
    fetch("/api/admin/teams"+(force?"?refresh=1":"")).then(function(r){return r.ok?r.json():null;}).then(function(d){
      if(rb){rb.disabled=false;rb.textContent="Refresh from LiteLLM";}
      var el=document.getElementById("teams"); el.textContent="";
      if(!d){el.textContent="Teams are admin-only.";return;}
      var note=document.getElementById("teams-src");
      if(note) note.textContent = d.cached
        ? "teams cached — click Refresh to re-detect from LiteLLM"
        : (d.source==="litellm" ? "just refreshed from LiteLLM"
           : "LiteLLM team lookup unavailable — showing last known"+(d.error?(" ("+d.error+")"):""));
      if(!(d.keys||[]).length){el.textContent="No LiteLLM keys seen yet — configure LITELLM_MASTER_KEY and send some traffic.";return;}
      var ts=d.team_summary||[];
      if(ts.length){
        var hd=document.createElement("div"); hd.className="tsumhd";
        hd.textContent=ts.length+" team"+(ts.length>1?"s":"")+" · monthly budget per member (each key inherits it)";
        el.appendChild(hd); el.appendChild(teamSummaryStrip(ts));
      }
      var asn=document.createElement("div"); asn.className="tsumhd";
      asn.textContent="By user — ranked by usage · click a name for details (ID · username · email · team · keys)";
      el.appendChild(asn);
      var dl=document.createElement("datalist"); dl.id="team-names";
      (d.teams||[]).forEach(function(t){var o=document.createElement("option");o.value=t;dl.appendChild(o);});
      el.appendChild(dl);
      // existing users (distinct emails LiteLLM reported) — the reassign dropdown offers
      // ONLY these, so a key can never be moved to a made-up user.
      _knownEmails=(d.keys||[]).map(function(k){return k.user_name;})
        .filter(function(e,i,a){return e && e.indexOf("@")>0 && a.indexOf(e)===i;}).sort();
      // group keys by LiteLLM user: username (primary) → team → its keys. Keys with no
      // user fall into one "Unassigned" group at the bottom.
      var groups={}, order=[];
      (d.keys||[]).forEach(function(k){
        // a per-key user override (user_grp) regroups the key under the new user/email
        var gid=k.user_grp||k.user||"__unassigned__";
        if(!groups[gid]){ groups[gid]={uid:k.user||"",name:k.user_name||"",team:"",keys:[],spent:0}; order.push(gid); }
        var g=groups[gid]; g.keys.push(k);
        g.spent += Number(k.spent)||0;
        if(!g.name && k.user_name) g.name=k.user_name;
        if(!g.team && k.team) g.team=k.team;
      });
      // rank by USAGE (total spend) so the top spenders are at the top — the scroll box
      // is sized to show ~10 users; "Unassigned" always sinks to the bottom.
      order.sort(function(a,b){
        if(a==="__unassigned__") return 1; if(b==="__unassigned__") return -1;
        return (groups[b].spent||0)-(groups[a].spent||0);
      });
      var scroll=document.createElement("div"); scroll.className="uscroll";
      order.forEach(function(gid){ scroll.appendChild(userBlock(groups[gid], gid, d.teams||[])); });
      el.appendChild(scroll);
    }).catch(function(){});
  }

  // ── Model cost classification (real vs estimated) ──
  function kindLabel(k){ return k==="reference"?"estimated":(k==="real"?"real":k||"—"); }
  function postModel(params){
    return fetch("/api/admin/model-kinds",{method:"POST",
      headers:{"Content-Type":"application/x-www-form-urlencoded","X-CSRF-Token":CSRF},
      body:new URLSearchParams(params).toString()})
      .then(function(r){return r.json().then(function(j){return {ok:r.ok,j:j};});});
  }
  function modelRow(m){
    // compact one-line row: model · kind select · ✓ · ↺; auto-detect + priced in tooltip.
    var row=document.createElement("div"); row.className="srow tmodel";
    var tip=m.model+"\nauto: "+kindLabel(m.default_kind)+(m.priced?" · LiteLLM priced":" · no LiteLLM price");
    var lbl=document.createElement("span"); lbl.className="lbl kname"; lbl.textContent=m.model; lbl.title=tip;
    if(m.overridden) lbl.classList.add("mod");
    row.appendChild(lbl);
    var sel=document.createElement("select"); sel.className="min"; sel.title=tip;
    [["real","Real (paid)"],["reference","Estimated"]].forEach(function(o){
      var op=document.createElement("option"); op.value=o[0]; op.textContent=o[1]; sel.appendChild(op);
    });
    sel.value=m.kind;
    var save=document.createElement("button"); save.className="ib save"; save.type="button"; save.textContent="✓"; save.title="Save";
    function say(txt,good){ save.classList.remove("ok","bad"); if(txt)save.classList.add(good?"ok":"bad");
      save.title=txt||"Save"; if(txt)setTimeout(function(){save.classList.remove("ok","bad");save.title="Save";},1600); }
    var reset=document.createElement("button"); reset.className="ib reset"; reset.type="button"; reset.textContent="↺"; reset.title="Reset to auto-detect";
    save.addEventListener("click",function(){
      postModel({action:"set",model:m.model,kind:sel.value}).then(function(res){
        if(!res.ok){say((res.j&&res.j.error)||"save failed",false);return;}
        say("saved",true); setTimeout(loadModels,900);
      }).catch(function(){say("save failed",false);});
    });
    reset.addEventListener("click",function(){
      postModel({action:"reset",model:m.model}).then(function(res){
        if(!res.ok){say((res.j&&res.j.error)||"reset failed",false);return;}
        say("reset",true); setTimeout(loadModels,900);
      }).catch(function(){say("reset failed",false);});
    });
    row.appendChild(sel); row.appendChild(save); row.appendChild(reset);
    return row;
  }
  function loadModels(){
    fetch("/api/admin/model-kinds").then(function(r){return r.ok?r.json():null;}).then(function(d){
      var el=document.getElementById("models"); el.textContent="";
      if(!d){el.textContent="Model costs are admin-only.";return;}
      var ms=d.models||[];
      if(!ms.length){
        el.textContent=d.error?("No models — "+d.error):"No models seen yet — configure LITELLM_BASE_URL / LITELLM_MASTER_KEY.";
        return;
      }
      var nReal=ms.filter(function(m){return m.kind==="real";}).length;
      var hd=document.createElement("div"); hd.className="tsumhd";
      hd.textContent=ms.length+" model"+(ms.length>1?"s":"")+" · "+nReal+" real, "+(ms.length-nReal)+" estimated";
      el.appendChild(hd);
      ms.forEach(function(m){ el.appendChild(modelRow(m)); });
    }).catch(function(){});
  }

  var _rb=document.getElementById("teams-refresh");
  if(_rb) _rb.addEventListener("click",function(){loadTeams(true);});
  var _ti=document.getElementById("teams-info");
  if(_ti){ _ti.addEventListener("click",openTeamsInfo);
    _ti.addEventListener("keydown",function(e){ if(e.key==="Enter"||e.key===" "){e.preventDefault();openTeamsInfo();} }); }
  var _mi=document.getElementById("models-info");
  if(_mi){ _mi.addEventListener("click",openModelsInfo);
    _mi.addEventListener("keydown",function(e){ if(e.key==="Enter"||e.key===" "){e.preventDefault();openModelsInfo();} }); }
  var _si=document.getElementById("settings-info");
  if(_si){ _si.addEventListener("click",openSettingsInfo);
    _si.addEventListener("keydown",function(e){ if(e.key==="Enter"||e.key===" "){e.preventDefault();openSettingsInfo();} }); }
  var _rl=document.getElementById("reset-layout");
  if(_rl) _rl.addEventListener("click",function(){
    _grid={};                       // clear saved DB positions + sizes → default arrangement
    fetch("/api/admin/ui-layout",{method:"POST",
      headers:{"Content-Type":"application/x-www-form-urlencoded","X-CSRF-Token":CSRF},
      body:new URLSearchParams({name:"settings_cards",grid:"{}"}).toString()})
      .then(function(){ load(); initBoardStatic(); }).catch(function(){ load(); });
  });

  fetch("/api/me").then(function(r){return r.ok?r.json():null;}).then(function(d){
    if(d){CSRF=d.csrf||"";document.getElementById("whoami").textContent=d.user?("Signed in as "+d.user):"";}
    loadLayout(function(){ load(); loadTeams(); loadModels(); initBoardStatic(); });
  }).catch(function(){ loadLayout(function(){load();loadTeams();loadModels();initBoardStatic();}); });
})();
</script>
<script>
/* collapsible lateral sidebar + nav-filter + alert-dot — parity with dashboards */
(function(){var KEY="aimon_sb";var _timers=[];
  function setC(c){document.body.classList.toggle("sb-collapsed",c);
    try{localStorage.setItem(KEY,c?"1":"0");}catch(e){}}
  try{if(localStorage.getItem(KEY)==="1")document.body.classList.add("sb-collapsed");}catch(e){}
  window.addEventListener("beforeunload",function(){_timers.forEach(clearInterval);});
  document.addEventListener("DOMContentLoaded",function(){
    var t=document.getElementById("sidebar-toggle"),r=document.getElementById("sidebar-reopen");
    if(t)t.addEventListener("click",function(){setC(true);});
    if(r)r.addEventListener("click",function(){setC(!document.body.classList.contains("sb-collapsed"));});
    var p=location.pathname;
    document.querySelectorAll("#sidebar-nav a").forEach(function(a){
      if(a.getAttribute("href")===p)a.classList.add("active");});
    fetch("/api/nav").then(function(r){return r.ok?r.json():null;}).then(function(n){
      if(!n)return;
      [["spend",n.spend],["litellm",n.litellm],["gpu",n.gpu],["ollama",n.ollama],["llamacpp",n.llamacpp]].forEach(function(x){
        if(!x[1])document.querySelectorAll('#sidebar-nav a[href="/'+x[0]+'"]').forEach(function(a){a.style.display="none";});
      });
    }).catch(function(){});
    function _alertDot(){fetch("/api/alerts").then(function(r){return r.ok?r.json():null;}).then(function(d){
      if(!d)return;var a=document.querySelector('#sidebar-nav a[href="/alerts"]');
      if(a)a.classList.toggle("has-alert",(d.active||[]).length>0);
    }).catch(function(){});}
    _alertDot();_timers.push(setInterval(_alertDot,10000));
  });
})();
</script>
