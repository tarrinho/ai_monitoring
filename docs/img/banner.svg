<svg width="1200" height="300" viewBox="0 0 1200 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="AI-Monitoring — read-only observability for a local LLM stack">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#58a6ff"/>
      <stop offset=".5" stop-color="#7ee787"/>
      <stop offset="1" stop-color="#bc8cff"/>
    </linearGradient>
    <linearGradient id="spark" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#7ee787" stop-opacity=".35"/>
      <stop offset="1" stop-color="#7ee787" stop-opacity="0"/>
    </linearGradient>
    <style>
      text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
      .chip{font-size:15px;font-weight:600;fill:#adbac7}
    </style>
  </defs>

  <rect width="1200" height="300" rx="18" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="6" rx="3" fill="url(#accent)"/>

  <!-- faux sparkline motif -->
  <path d="M60 210 L120 190 L180 200 L240 150 L300 168 L360 120 L420 138 L480 96 L540 110"
        stroke="#7ee787" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity=".9"/>
  <path d="M60 210 L120 190 L180 200 L240 150 L300 168 L360 120 L420 138 L480 96 L540 110 L540 230 L60 230 Z"
        fill="url(#spark)"/>

  <!-- title -->
  <text x="60" y="118" font-size="66" font-weight="800" fill="#e6edf3" letter-spacing="-1">AI-Monitoring</text>
  <text x="63" y="158" font-size="22" font-weight="500" fill="#8b949e">Read-only observability for a local LLM stack — no agents, no external deps.</text>

  <!-- backend chips -->
  <g transform="translate(63,196)">
    <g>
      <rect x="0" y="0" width="86" height="34" rx="17" fill="#1c2230" stroke="#30363d"/>
      <circle cx="20" cy="17" r="5" fill="#58a6ff"/><text x="34" y="23" class="chip">Host</text>
    </g>
    <g transform="translate(98,0)">
      <rect x="0" y="0" width="80" height="34" rx="17" fill="#1c2230" stroke="#30363d"/>
      <circle cx="20" cy="17" r="5" fill="#bc8cff"/><text x="34" y="23" class="chip">GPU</text>
    </g>
    <g transform="translate(190,0)">
      <rect x="0" y="0" width="110" height="34" rx="17" fill="#1c2230" stroke="#30363d"/>
      <circle cx="20" cy="17" r="5" fill="#f0883e"/><text x="34" y="23" class="chip">Ollama</text>
    </g>
    <g transform="translate(312,0)">
      <rect x="0" y="0" width="126" height="34" rx="17" fill="#1c2230" stroke="#30363d"/>
      <circle cx="20" cy="17" r="5" fill="#7ee787"/><text x="34" y="23" class="chip">llama.cpp</text>
    </g>
    <g transform="translate(450,0)">
      <rect x="0" y="0" width="104" height="34" rx="17" fill="#1c2230" stroke="#30363d"/>
      <circle cx="20" cy="17" r="5" fill="#d29922"/><text x="34" y="23" class="chip">LiteLLM</text>
    </g>
    <g transform="translate(566,0)">
      <rect x="0" y="0" width="132" height="34" rx="17" fill="#1c2230" stroke="#30363d"/>
      <circle cx="20" cy="17" r="5" fill="#ff7b72"/><text x="34" y="23" class="chip">Containers</text>
    </g>
  </g>

  <!-- right-side KPI tiles -->
  <g transform="translate(820,70)" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif">
    <g>
      <rect x="0" y="0" width="150" height="72" rx="12" fill="#1c2230" stroke="#30363d"/>
      <text x="16" y="34" font-size="30" font-weight="700" fill="#7ee787">57</text>
      <text x="16" y="56" font-size="12" fill="#8b949e" letter-spacing=".05em">TOKENS / S</text>
    </g>
    <g transform="translate(166,0)">
      <rect x="0" y="0" width="150" height="72" rx="12" fill="#1c2230" stroke="#30363d"/>
      <text x="16" y="34" font-size="30" font-weight="700" fill="#58a6ff">262k</text>
      <text x="16" y="56" font-size="12" fill="#8b949e" letter-spacing=".05em">CONTEXT</text>
    </g>
    <g transform="translate(0,86)">
      <rect x="0" y="0" width="150" height="72" rx="12" fill="#1c2230" stroke="#30363d"/>
      <text x="16" y="34" font-size="30" font-weight="700" fill="#bc8cff">96%</text>
      <text x="16" y="56" font-size="12" fill="#8b949e" letter-spacing=".05em">GPU UTIL</text>
    </g>
    <g transform="translate(166,86)">
      <rect x="0" y="0" width="150" height="72" rx="12" fill="#1c2230" stroke="#30363d"/>
      <text x="16" y="34" font-size="30" font-weight="700" fill="#d29922">0</text>
      <text x="16" y="56" font-size="12" fill="#8b949e" letter-spacing=".05em">BACKLOG</text>
    </g>
  </g>
</svg>
