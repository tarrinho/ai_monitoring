global:
  scrape_interval: 5s
  scrape_timeout: 4s

scrape_configs:
  - job_name: ai-monitoring
    metrics_path: /metrics
    # bearer token — MUST equal MONITOR_METRICS_TOKEN in docker-compose.yml
    authorization:
      credentials: CHANGE_ME_scrape_token
    static_configs:
      - targets: ["ai-monitoring:9925"]
