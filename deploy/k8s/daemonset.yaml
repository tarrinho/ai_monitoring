# AI-Monitoring per-node DaemonSet — one pod per node for host + GPU metrics.
# A central Prometheus scrapes every pod's /metrics; aggregate in Grafana by node.
# Reuses the Secret/Namespace/Service/ServiceMonitor from ai-monitoring.yaml.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: ai-monitoring-node
  namespace: ai-monitoring
  labels: { app.kubernetes.io/name: ai-monitoring }
spec:
  selector:
    matchLabels: { app.kubernetes.io/name: ai-monitoring }
  template:
    metadata:
      labels: { app.kubernetes.io/name: ai-monitoring }
    spec:
      hostPID: true              # see host processes (top-N by CPU/RAM)
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        seccompProfile: { type: RuntimeDefault }
      # schedule onto GPU nodes; drop the selector to run on all nodes
      # nodeSelector: { nvidia.com/gpu.present: "true" }
      containers:
        - name: ai-monitoring
          image: ghcr.io/tarrinho/ai_monitoring:1.8.5
          ports:
            - { name: http, containerPort: 9925 }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          env:
            - { name: MONITOR_PORT, value: "9925" }
            - { name: MONITOR_METRICS_ENABLED, value: "1" }
            # host writes nvidia-smi CSV to this hostPath (see deploy/gpu-metrics.service)
            - { name: GPU_METRICS_FILE, value: "/gpu/gpu.csv" }
          envFrom:
            - secretRef: { name: ai-monitoring }
          volumeMounts:
            - { name: data, mountPath: /data }
            - { name: tmp, mountPath: /tmp }
            - { name: gpu-metrics, mountPath: /gpu, readOnly: true }
          readinessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { cpu: 500m, memory: 256Mi }
      volumes:
        - name: data
          emptyDir: {}           # per-node, ephemeral (metrics scraped by Prometheus)
        - name: tmp
          emptyDir: {}
        - name: gpu-metrics
          hostPath:
            path: /var/lib/aimon-gpu
            type: DirectoryOrCreate
