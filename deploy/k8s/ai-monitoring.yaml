# AI-Monitoring on Kubernetes — plain manifests (kubectl apply -f).
# Central Deployment that scrapes remote backends and exports /metrics. For per-node
# host/GPU metrics run one per node — see daemonset.yaml. Edit the Secret first.
apiVersion: v1
kind: Namespace
metadata:
  name: ai-monitoring
---
apiVersion: v1
kind: Secret
metadata:
  name: ai-monitoring
  namespace: ai-monitoring
type: Opaque
stringData:
  MONITOR_ADMIN_USER: "admin"
  MONITOR_ADMIN_PASSWORD: "CHANGE_ME_strong_password"   # seeds the first admin
  MONITOR_ADMIN_EMAIL: "admin@example.com"
  MONITOR_METRICS_TOKEN: "CHANGE_ME_scrape_token"       # least-privilege scrape cred
  # LITELLM_BASE_URL: "http://litellm.llm.svc:4000"
  # LITELLM_MASTER_KEY: "sk-..."
  # OLLAMA_BASE_URL: "http://ollama.llm.svc:11434"
  # LLAMACPP_BASE_URL: "http://llamacpp.llm.svc:8080"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ai-monitoring-data
  namespace: ai-monitoring
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-monitoring
  namespace: ai-monitoring
  labels: { app.kubernetes.io/name: ai-monitoring }
spec:
  replicas: 1
  selector:
    matchLabels: { app.kubernetes.io/name: ai-monitoring }
  template:
    metadata:
      labels: { app.kubernetes.io/name: ai-monitoring }
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001                       # PVC write access for the non-root user
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: ai-monitoring
          image: ghcr.io/tarrinho/ai_monitoring:1.4.0
          ports:
            - { name: http, containerPort: 9925 }
          securityContext:                    # restricted Pod Security Standard
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          env:
            - { name: MONITOR_PORT, value: "9925" }
            - { name: MONITOR_METRICS_ENABLED, value: "1" }
          envFrom:
            - secretRef: { name: ai-monitoring }
          volumeMounts:
            - { name: data, mountPath: /data }
            - { name: tmp, mountPath: /tmp }   # writable /tmp under readOnlyRootFilesystem
          readinessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 20
            periodSeconds: 30
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { cpu: 500m, memory: 256Mi }
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: ai-monitoring-data
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: ai-monitoring
  namespace: ai-monitoring
  labels: { app.kubernetes.io/name: ai-monitoring }
spec:
  selector: { app.kubernetes.io/name: ai-monitoring }
  ports:
    - { name: http, port: 9925, targetPort: http }
---
# Prometheus Operator scrape config (requires the ServiceMonitor CRD).
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: ai-monitoring
  namespace: ai-monitoring
  labels: { app.kubernetes.io/name: ai-monitoring }
spec:
  selector:
    matchLabels: { app.kubernetes.io/name: ai-monitoring }
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      authorization:
        credentials:
          name: ai-monitoring
          key: MONITOR_METRICS_TOKEN
---
# OPTIONAL NetworkPolicy — uncomment + adjust to restrict who can reach the
# dashboard/metrics. Default is commented out so cross-namespace Prometheus scraping
# keeps working out of the box. Set the namespaceSelector to your Prometheus namespace.
