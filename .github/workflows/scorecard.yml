# OpenSSF Scorecard — supply-chain security posture score.
# Publishes results to the public OpenSSF crawler (api.securityscorecards.dev)
# which serves the README badge, and uploads SARIF to code-scanning.
# Action SHAs are pinned so Scorecard's own Pinned-Dependencies check passes.
name: Scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: '27 4 * * 1'   # weekly, Monday 04:27 UTC
  push:
    branches: [ main ]
  workflow_dispatch:

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # upload SARIF to code-scanning
      id-token: write          # OIDC token for publish_results (no secret needed)

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@62b2cac7ed8198b15735ed49ab1e5cf35480ba46 # v2.4.1
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@f58f0d11ebf5dedd870fab2f999275f7602cfa46 # codeql-bundle-v2.26.0
        with:
          sarif_file: results.sarif
