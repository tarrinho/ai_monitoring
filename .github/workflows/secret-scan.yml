name: secret-scan
# Title each run by the job (not the generic publish commit message).
run-name: secret-scan

# rules.md §7 — TruffleHog secret scan (working tree + full commit history).
on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  secret-scan:
    name: TruffleHog secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0          # full history so the scan sees past commits
      # Official TruffleHog action — working tree + commit range, verified +
      # unknown results, non-zero exit on a hit.
      - name: TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --results=verified,unknown --exclude-paths=.trufflehog-exclude
