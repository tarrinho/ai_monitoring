name: CI

# One aggregated workflow so the Actions page shows a SINGLE run per push, while
# each control still gets its own README badge: the final `badges` job publishes a
# per-control shields "endpoint" JSON to an orphan `badges` branch, which the
# README reads. Controls (rules.md): secret-scan §7 · lint §9 · tests §1/§2 ·
# trivy-fs §10 · build-scan §14/§10.
on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  secret-scan:
    name: TruffleHog secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0          # full history so the scan sees past commits
      - name: TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --results=verified,unknown --exclude-paths=.trufflehog-exclude

  lint:
    name: lint + type (ruff / bandit / semgrep / mypy / vulture)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install tools
        run: |
          pip install -r requirements.txt
          pip install ruff bandit semgrep mypy vulture
      - name: ruff (lint)
        run: ruff check .
      - name: bandit (High severity only → 0 allowed)
        run: bandit -r . -x ./tests -lll
      - name: semgrep (OSS registry rules — NO auto / NO token)
        run: semgrep --config p/python --config p/security-audit --error .
      - name: mypy (typed source)
        run: mypy --ignore-missing-imports app.py config.py collectors/ db.py
      - name: vulture (dead code — informational)
        continue-on-error: true
        run: vulture app.py config.py collectors db.py --min-confidence 80

  tests:
    name: pytest (static + dynamic)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: python -m pytest tests/test_static_qa.py tests/test_dynamic_qa.py -q

  trivy-fs:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Trivy fs (HIGH/CRITICAL → fail)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          cache: "false"   # skip trivy-action's internal actions/cache (node20 dep)

  build-scan:
    name: build (test gate) + Trivy image scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Build image (in-image test gate)
        run: docker build --build-arg RUN_TESTS=1 -t ai-monitoring:ci .
      - name: Trivy image (HIGH/CRITICAL → fail)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: image
          image-ref: ai-monitoring:ci
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          cache: "false"

  # Aggregate each control's result into per-control shields "endpoint" badges,
  # committed to an orphan `badges` branch (single force-pushed commit, no history
  # churn, off main). Runs even when a control fails, only on pushes to main.
  badges:
    name: publish status badges
    needs: [secret-scan, lint, tests, trivy-fs, build-scan]
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Write badge JSON + push to `badges` branch
        env:
          R_SECRET: ${{ needs.secret-scan.result }}
          R_LINT:   ${{ needs.lint.result }}
          R_TESTS:  ${{ needs.tests.result }}
          R_TRIVY:  ${{ needs.trivy-fs.result }}
          R_BUILD:  ${{ needs.build-scan.result }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir out && cd out
          mk() {   # <file> <label> <result>
            case "$3" in
              success)   msg=passing;   col=brightgreen;;
              failure)   msg=failing;   col=red;;
              cancelled) msg=cancelled; col=inactive;;
              skipped)   msg=skipped;   col=lightgrey;;
              *)         msg="$3";      col=yellow;;
            esac
            printf '{"schemaVersion":1,"label":"%s","message":"%s","color":"%s"}\n' \
              "$2" "$msg" "$col" > "$1.json"
          }
          mk secret-scan secret-scan "$R_SECRET"
          mk lint        lint        "$R_LINT"
          mk tests       tests       "$R_TESTS"
          mk trivy-fs    trivy-fs    "$R_TRIVY"
          mk build-scan  build-scan  "$R_BUILD"
          git init -q
          git checkout -q -b badges
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "badges: ${GITHUB_SHA::7}"
          git push -q --force \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" badges
