name: CI

# One aggregated workflow so the Actions page shows a SINGLE run per push, while
# each control still gets its own README badge: the final `badges` job publishes a
# per-control shields "endpoint" JSON to an orphan `badges` branch, which the
# README reads. Controls (rules.md): secret-scan §7 · lint §9 · tests §1/§2 ·
# trivy-fs §10 · build-scan §14/§10.
on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  secret-scan:
    name: secret scan (TruffleHog + gitleaks)
    runs-on: ubuntu-latest
    steps:
      # Actions pinned to full commit SHA (was major-tag / @main). GitHub's
      # security-hardening guide requires SHA-pinning for third-party actions;
      # Dependabot's github-actions ecosystem opens PRs against pinned SHAs.
      # Bump deliberately by replacing SHA + trailing tag comment.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0          # full history so both scanners see past commits
      - name: TruffleHog
        # Was @main (mutable branch — supply-chain risk).
        uses: trufflesecurity/trufflehog@27b0417c16317ca9a472a9a8092acce143b49c55 # v3.95.9
        with:
          path: ./
          extra_args: --results=verified,unknown --exclude-paths=.trufflehog-exclude
      # Second, independent secret scanner. Reads .gitleaks.toml (built-in rules +
      # allowlist for the synthetic values in tests/ + .env.example). Scans full
      # commit history (fetch-depth:0 above) and fails on any leak. We run the
      # gitleaks binary directly instead of the marketplace Node action — that
      # action bundles a deprecated Node 20 runtime; the binary has no Node
      # dependency and stays green as runners drop Node 20.
      - name: gitleaks
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          ver=$(curl -sSL -H "Authorization: Bearer $GITHUB_TOKEN" \
            https://api.github.com/repos/gitleaks/gitleaks/releases/latest \
            | grep -oP '"tag_name":\s*"v\K[^"]+')
          echo "gitleaks v${ver}"
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${ver}/gitleaks_${ver}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          ./gitleaks git . --config .gitleaks.toml --redact -v

  lint:
    name: lint + type (ruff / bandit / semgrep / mypy / vulture)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Install tools
        run: |
          pip install -r requirements.txt
          pip install ruff bandit semgrep mypy vulture
      - name: ruff (lint)
        run: ruff check .
      - name: bandit (High severity only → 0 allowed)
        run: bandit -r . -x ./tests -lll
      - name: semgrep (OSS registry rules — NO auto / NO token)
        run: semgrep --config p/python --config p/security-audit --error .
      - name: mypy (typed source)
        run: mypy --ignore-missing-imports app.py config.py collectors/ db.py auth.py alerts.py metrics_prom.py
      - name: vulture (dead code — informational)
        continue-on-error: true
        run: vulture app.py config.py collectors db.py --min-confidence 80

  tests:
    name: pytest (full suite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt -r requirements-dev.txt
      # Whole tests/ dir — the live test_testenv.py auto-skips when the stack is
      # absent (it is, in CI). Do NOT name individual files: a new suite would
      # then silently never run. Mirrors rules.md §2 + the in-image build gate.
      # --reruns 1: a transient cross-test/timing flake retries once (a real failure
      # fails twice → still red). --cov-fail-under: coverage floor, can't silently rot.
      - run: >
          python -m pytest tests/ -q
          --reruns 1 --reruns-delay 2
          --cov=app --cov=config --cov=db --cov=auth --cov=alerts
          --cov=anomaly --cov=metrics_prom --cov=collectors
          --cov-report=term-missing --cov-fail-under=80

  trivy-fs:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Trivy fs (HIGH/CRITICAL → fail)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          cache: "false"   # skip trivy-action's internal actions/cache (node20 dep)

  build-scan:
    name: build (test gate) + Trivy image scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Build image (in-image test gate)
        run: docker build --build-arg RUN_TESTS=1 -t ai-monitoring:ci .
      - name: Trivy image (HIGH/CRITICAL → fail)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: ai-monitoring:ci
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          cache: "false"

  # Aggregate each control's result into per-control shields "endpoint" badges,
  # committed to an orphan `badges` branch (single force-pushed commit, no history
  # churn, off main). Runs even when a control fails, only on pushes to main.
  badges:
    name: publish status badges
    needs: [secret-scan, lint, tests, trivy-fs, build-scan]
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    # Cosmetic side-channel: never let a failure to publish badges red the CI run.
    # A 403 here means the repo's GITHUB_TOKEN is read-only (Settings → Actions →
    # General → Workflow permissions → "Read and write permissions") or a ruleset
    # blocks the bot on the `badges` branch. Either way it's not a build failure.
    continue-on-error: true
    permissions:
      contents: write
    steps:
      - name: Write badge JSON + push to `badges` branch
        env:
          R_SECRET: ${{ needs.secret-scan.result }}
          R_LINT:   ${{ needs.lint.result }}
          R_TESTS:  ${{ needs.tests.result }}
          R_TRIVY:  ${{ needs.trivy-fs.result }}
          R_BUILD:  ${{ needs.build-scan.result }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir out && cd out
          mk() {   # <file> <label> <result>
            case "$3" in
              success)   msg=passing;   col=brightgreen;;
              failure)   msg=failing;   col=red;;
              cancelled) msg=cancelled; col=inactive;;
              skipped)   msg=skipped;   col=lightgrey;;
              *)         msg="$3";      col=yellow;;
            esac
            printf '{"schemaVersion":1,"label":"%s","message":"%s","color":"%s"}\n' \
              "$2" "$msg" "$col" > "$1.json"
          }
          mk secret-scan secret-scan "$R_SECRET"
          mk lint        lint        "$R_LINT"
          mk tests       tests       "$R_TESTS"
          mk trivy-fs    trivy-fs    "$R_TRIVY"
          mk build-scan  build-scan  "$R_BUILD"
          git init -q
          git checkout -q -b badges
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "badges: ${GITHUB_SHA::7}"
          if git push -q --force \
               "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" badges
          then
            echo "badges: pushed to \`badges\` branch"
          else
            echo "::warning title=badges not published::git push to the \`badges\` branch was denied (HTTP 403). Set Settings → Actions → General → Workflow permissions to \"Read and write permissions\", or exclude \`badges\` from any branch ruleset. README badges will show the last successful publish until then."
          fi
