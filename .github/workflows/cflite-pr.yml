# ClusterFuzzLite — fuzz the parsers on every PR (code-change mode: builds the
# harnesses in fuzz/, runs them for a few minutes, fails the PR on a new crash and
# uploads it as an artifact). Satisfies the OpenSSF Scorecard Fuzzing check.
# Action SHAs pinned (Scorecard Pinned-Dependencies); Dependabot bumps them.
name: ClusterFuzzLite PR

on:
  pull_request:
    branches: [ main ]

permissions: read-all

jobs:
  Fuzzing:
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # upload crash findings to code-scanning (SARIF)
      contents: read
    concurrency:
      group: cflite-${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Build fuzzers
        id: build
        uses: google/clusterfuzzlite/actions/build_fuzzers@884713a6c30a92e5e8544c39945cd7cb630abcd1 # v1
        with:
          language: python
      - name: Run fuzzers
        uses: google/clusterfuzzlite/actions/run_fuzzers@884713a6c30a92e5e8544c39945cd7cb630abcd1 # v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          fuzz-seconds: 300
          mode: 'code-change'
          output-sarif: true
