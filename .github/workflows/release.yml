name: release
run-name: release ${{ github.event.inputs.tag || github.ref_name }}

# On a version tag (v1.2.3) this fills the two things a fresh repo is missing:
#   • Packages — builds the multi-arch image and pushes it to GitHub Container
#     Registry (ghcr.io/<owner>/<repo>), using the built-in GITHUB_TOKEN.
#   • Releases — creates a GitHub Release whose notes are the matching CHANGELOG
#     section.
# The per-commit test gate already ran in the `tests` + `build-scan` workflows on
# the same commit (verified by the "Require CI green" step below), so the
# release build itself uses RUN_TESTS=0 to avoid a slow emulated pytest run on
# the arm targets.
#
# Every third-party action is SHA-pinned per GitHub's security-hardening guide;
# Dependabot's github-actions ecosystem opens PRs against pinned SHAs so update
# visibility is preserved. Bump deliberately by replacing SHA + version comment.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing version tag to (re)release, e.g. v1.4.0"
        required: true
      skip_ci_check:
        description: "Skip the 'CI green on this SHA' gate (use only for a re-tag whose CI was cancelled/expired but has been verified locally)"
        type: boolean
        default: false
        required: false

# Minimal default for the whole workflow (OpenSSF Scorecard Token-Permissions);
# the release job escalates only the writes it needs.
permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create the GitHub Release
      packages: write   # push the image to ghcr.io
      id-token: write   # cosign keyless signing (Fulcio OIDC)
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Resolve tag + lowercase image name
        id: meta
        run: |
          echo "tag=${{ github.event.inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      # ── Gate: refuse to release a SHA that CI didn't sign off on ─────────
      # A tag pushed straight to main (or a workflow_dispatch on a stale tag)
      # would otherwise ship without confirming the source commit passed CI.
      # Looks up the CI workflow's most-recent conclusion for this HEAD SHA;
      # aborts unless it's `success`. skip-ci override for the rare case where
      # the release is a re-tag of a commit whose CI was cancelled/expired but
      # the operator has verified locally.
      - name: Require CI green on this SHA
        if: github.event.inputs.skip_ci_check != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          sha="${{ github.sha }}"
          # CI and this release both fire on the tag push, so CI is usually still
          # running when we get here — POLL for the newest CI run on this SHA to
          # CONCLUDE (don't demand it be already-completed, which raced to 'none').
          deadline=$(( $(date +%s) + 1200 ))   # wait up to 20 min for CI to finish
          while :; do
            line=$(gh api \
              "repos/${GITHUB_REPOSITORY}/actions/runs?head_sha=${sha}" \
              --jq '[.workflow_runs[] | select(.name=="CI")][0] // {}
                    | "\(.status // "none") \(.conclusion // "none")"')
            status="${line% *}"; conclusion="${line#* }"
            if [ "$status" = "completed" ]; then
              if [ "$conclusion" = "success" ]; then
                echo "CI green on ${sha} — proceeding to release."
                break
              fi
              echo "::error::CI concluded '${conclusion}' (not success) on ${sha}."
              echo "::error::Fix CI, or re-dispatch with skip_ci_check=true after manual verification."
              exit 1
            fi
            if [ "$(date +%s)" -ge "$deadline" ]; then
              echo "::error::Timed out waiting for CI on ${sha} (last status: '${status}')."
              echo "::error::Wait for CI to finish, or re-dispatch with skip_ci_check=true."
              exit 1
            fi
            echo "CI status='${status}' on ${sha} — waiting 15s for it to finish…"
            sleep 15
          done

      # ── Packages: multi-arch image → GHCR ─────────────────────────────────
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Log in to GHCR
        uses: docker/login-action@06fb636fac595d6fb4b28a5dfcb21a6f5091859c # v4.5.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build + push image (amd64 / arm64 / armv7)
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          build-args: RUN_TESTS=0
          push: true
          # SLSA-max provenance + SBOM attestations pushed alongside the image
          # so consumers can `cosign verify-attestation ...` without extra CI.
          provenance: mode=max
          sbom: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.image }}:latest

      # ── Sign the pushed image (cosign keyless via Fulcio OIDC) ────────────
      # Sigstore keyless — no long-lived key material, identity is the GHA
      # workflow's OIDC token. Consumers verify with:
      #   cosign verify --certificate-identity-regexp \
      #     "^https://github.com/${GITHUB_REPOSITORY}/.github/workflows/release.yml@" \
      #     --certificate-oidc-issuer https://token.actions.githubusercontent.com \
      #     ghcr.io/${GITHUB_REPOSITORY}:<tag>
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Sign published image
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          set -euo pipefail
          # Prefer signing by the immutable digest emitted by build-push-action,
          # not the tag — tags mutate; digests don't.
          digest="${{ steps.build.outputs.digest }}"
          if [ -z "$digest" ]; then
            echo "::error::build step did not emit a digest — cannot sign."
            exit 1
          fi
          cosign sign --yes "${{ steps.meta.outputs.image }}@${digest}"

      # ── Signed release assets (OpenSSF Scorecard Signed-Releases) ─────────
      # The OCI image signature above is NOT visible to Scorecard's Signed-Releases
      # check — that check inspects GitHub *Release assets*. So also emit a small
      # image-provenance manifest and keyless-sign it as a detached blob; the
      # resulting .bundle (cosign signature + certificate + Rekor proof) is attached below.
      - name: Sign release manifest (cosign sign-blob)
        id: signblob
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          set -euo pipefail
          tag="${{ steps.meta.outputs.tag }}"
          man="ai-monitoring-${tag}-image.txt"
          {
            echo "image:     ${{ steps.meta.outputs.image }}:${tag}"
            echo "digest:    ${{ steps.meta.outputs.image }}@${{ steps.build.outputs.digest }}"
            echo "platforms: linux/amd64, linux/arm64, linux/arm/v7"
          } > "$man"
          # cosign's current default is the single-file bundle format (signature +
          # certificate + Rekor inclusion proof in one .bundle). The old
          # --output-signature / --output-certificate flags are deprecated and IGNORED
          # under it (and error out when no --bundle is given), so emit a .bundle.
          # Verify with: cosign verify-blob --bundle <man>.bundle --certificate-identity-regexp … <man>
          cosign sign-blob --yes \
            --bundle "${man}.bundle" \
            "$man"
          echo "manifest=${man}" >> "$GITHUB_OUTPUT"

      # ── Releases: GitHub Release with CHANGELOG notes ─────────────────────
      - name: Extract CHANGELOG section for this tag
        run: |
          set -euo pipefail
          v="${{ steps.meta.outputs.tag }}"; v="${v#v}"
          # Literal-string match (was `$0 ~ "^## \\[" ver "\\]"` regex — semver
          # is safe today, but any future non-semver tag with a regex metachar
          # would break the older form).
          awk -v hdr="## [$v]" '
            $0 == hdr {p=1; next}
            p && /^## \[/ {exit}
            p {print}
          ' CHANGELOG.md > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "Release ${{ steps.meta.outputs.tag }}." > RELEASE_NOTES.md
          fi
          {
            echo ""
            echo "---"
            echo "**Container image:** \`docker pull ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}\`  (amd64 · arm64 · armv7)"
            echo ""
            echo "**Signed:** cosign keyless (Sigstore/Fulcio). Verify with:"
            echo '```bash'
            echo "cosign verify --certificate-identity-regexp \\"
            echo "  \"^https://github.com/${GITHUB_REPOSITORY}/.github/workflows/release.yml@\" \\"
            echo "  --certificate-oidc-issuer https://token.actions.githubusercontent.com \\"
            echo "  ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}"
            echo '```'
          } >> RELEASE_NOTES.md
      - name: Create (or update) the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.meta.outputs.tag }}"
          man="${{ steps.signblob.outputs.manifest }}"
          assets=("$man" "${man}.bundle")   # signed release artifacts (cosign bundle)
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" --title "AI-Monitoring $tag" --notes-file RELEASE_NOTES.md
            gh release upload "$tag" "${assets[@]}" --clobber
          else
            gh release create "$tag" --title "AI-Monitoring $tag" --notes-file RELEASE_NOTES.md "${assets[@]}"
          fi
