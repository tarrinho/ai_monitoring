# CodeQL is handled by GitHub "default setup" (repo Settings → Code security),
# which scans Python + Actions automatically. This advanced CodeQL workflow is
# intentionally DISABLED: an advanced CodeQL analysis cannot coexist with default
# setup — GitHub rejects its SARIF ("analyses from advanced configurations cannot
# be processed when the default setup is enabled").
#
# It is kept as a manual-only stub (not deleted) because the publish/sync pipeline
# does not propagate file deletions; a no-op `workflow_dispatch` workflow never runs
# on push/PR, so it uploads no SARIF and cannot conflict. To remove it entirely,
# delete this file on the Mac working copy AND on GitHub.
name: CodeQL (disabled — default setup in use)

on: workflow_dispatch   # never triggers on push/PR → no CodeQL analysis, no SARIF, no conflict

permissions:
  contents: read

jobs:
  noop:
    runs-on: ubuntu-latest
    steps:
      - name: Explain
        run: echo "CodeQL runs via GitHub default setup. This advanced workflow is intentionally disabled."
